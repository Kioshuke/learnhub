<!-- admin/index.html -->

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <div class="container">
    <h1>Admin Dashboard</h1>

    <div class="stats">
      <div class="card">
        <h3>Tổng User</h3>
        <p id="totalUsers">0</p>
      </div>

      <div class="card">
        <h3>Đang Online</h3>
        <p id="onlineUsers">0</p>
      </div>
    </div>

    <h2>Quản lý người dùng</h2>

    <table id="userTable">
      <thead>
        <tr>
          <th>Tên</th>
          <th>Email</th>
          <th>Role</th>
          <th>Trạng thái</th>
          <th>Hành động</th>
        </tr>
      </thead>

      <tbody id="userList">
      </tbody>
    </table>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="admin.js"></script>

</body>
</html>
