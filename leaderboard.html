<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Xếp Hạng - LearnHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* RESET & BASE STYLES */
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#eef2ff 0%,#f0f9ff 50%,#fdf4ff 100%);min-height:100vh;-webkit-font-smoothing:antialiased;color:#1e293b;overflow-x:hidden;position:relative;scrollbar-width:none}
        html{scrollbar-width:none}
        html::-webkit-scrollbar,body::-webkit-scrollbar{width:0;height:0}
        
        /* FLOATING DECORATIVE SHAPES */
        .bg-shapes{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
        .bg-shapes span{position:absolute;border-radius:50%;opacity:.12;animation:floatUp linear infinite}
        .bg-shapes span:nth-child(1){width:60px;height:60px;background:#4f46e5;left:10%;animation-duration:18s;animation-delay:0s}
        .bg-shapes span:nth-child(2){width:40px;height:40px;background:#f59e0b;left:25%;animation-duration:22s;animation-delay:3s}
        .bg-shapes span:nth-child(3){width:80px;height:80px;background:#ec4899;left:50%;animation-duration:25s;animation-delay:1s}
        .bg-shapes span:nth-child(4){width:35px;height:35px;background:#10b981;left:70%;animation-duration:20s;animation-delay:5s}
        .bg-shapes span:nth-child(5){width:50px;height:50px;background:#8b5cf6;left:85%;animation-duration:24s;animation-delay:2s}
        .bg-shapes span:nth-child(6){width:25px;height:25px;background:#06b6d4;left:40%;animation-duration:16s;animation-delay:4s}
        @keyframes floatUp{0%{bottom:-80px;transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.1)}100%{bottom:110vh;transform:rotate(360deg) scale(1)}}
        
        .wrap{max-width:1000px;margin:0 auto;min-height:100vh;padding:0 24px;container-type:inline-size;container-name:lb;position:relative;z-index:1}

        /* HEADER MODERN */
        .hdr{text-align:center;padding:36px 0 28px;position:relative}
        .hdr::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(99,102,241,.12),rgba(251,191,36,.06),transparent 65%);pointer-events:none}
        .hdr-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:99px;font-size:11px;font-weight:700;color:#fff;letter-spacing:.04em;text-transform:uppercase;margin-bottom:12px;box-shadow:0 4px 12px rgba(99,102,241,.25)}
        .hdr h1{font-size:30px;font-weight:900;color:#0f172a;letter-spacing:-.01em;text-transform:uppercase;line-height:1.2}
        .hdr p{font-size:13px;color:#64748b;font-weight:500;margin-top:6px}
        .hdr-stars{position:relative;display:inline-block}
        .hdr-stars::before,.hdr-stars::after{content:'✦';position:absolute;font-size:14px;opacity:.25;animation:twinkle 2s ease-in-out infinite alternate}
        .hdr-stars::before{top:-8px;left:-20px;color:#f59e0b}
        .hdr-stars::after{top:-8px;right:-20px;color:#4f46e5;animation-delay:1s}
        @keyframes twinkle{0%{opacity:.15;transform:scale(.8)}100%{opacity:.4;transform:scale(1.2)}}
        .week-tag{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;background:#fff;border-radius:99px;font-size:12px;font-weight:600;color:#475569;box-shadow:0 2px 12px rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.1)}
        .week-dot{width:8px;height:8px;border-radius:50%;background:#10b981;box-shadow:0 0 6px rgba(16,185,129,.4)}

        /* LAYOUT GRID CHUẨN AZOTA */
        .lb-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            align-items: flex-start;
            padding-bottom: 40px;
        }

        /* BỤC VINH QUANG TRÁI (ẨN KHI IFRAME NHỎ) */
        .podium-side {
            display: none;
            background: #fff;
            padding: 32px 24px 24px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(99,102,241,.06),0 2px 8px rgba(0,0,0,.03);
            border: 1px solid rgba(99,102,241,.08);
            position: relative;
            overflow: hidden;
        }
        .podium-side::before {
            content: '';
            position: absolute; inset: 0;
            background-image: radial-gradient(circle at 10% 15%, rgba(99,102,241,.08) 0%, transparent 50%),
                              radial-gradient(circle at 90% 85%, rgba(251,191,36,.07) 0%, transparent 50%),
                              radial-gradient(circle at 50% 50%, rgba(236,72,153,.04) 0%, transparent 60%);
            pointer-events: none;
        }
        .podium-title {
            font-size: 13px;
            font-weight: 800;
            background: linear-gradient(135deg,#4f46e5,#7c3aed);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            text-align: center;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            position: relative;
        }

        /* KHUNG BỤC */
        .top3{display:flex;justify-content:center;align-items:flex-end;gap:16px;padding:0 8px}
        .top3-item{display:flex;flex-direction:column;align-items:center;width:100px;min-height:280px;justify-content:flex-end;position:relative}
        .ava-ring{display:inline-block;border-radius:50%;padding:4px;line-height:0;position:relative}
        .ring-gold{background:linear-gradient(135deg,#fbbf24,#f59e0b);box-shadow:0 0 20px rgba(251,191,36,.3),0 0 40px rgba(251,191,36,.1);animation:goldGlow 2s ease-in-out infinite alternate}
        .ring-silver{background:linear-gradient(135deg,#cbd5e1,#94a3b8)}
        .ring-bronze{background:linear-gradient(135deg,#f59e0b,#d97706)}
        @keyframes goldGlow{from{box-shadow:0 0 15px rgba(251,191,36,.25),0 0 30px rgba(251,191,36,.08)}to{box-shadow:0 0 25px rgba(251,191,36,.45),0 0 50px rgba(251,191,36,.15)}}
        .ava-inner{border-radius:50%;overflow:hidden;background:#f1f5f9;display:flex;align-items:center;justify-content:center}
        .ava-inner img{width:100%;height:100%;object-fit:cover;display:block}
        .ava-initial{font-weight:800;color:#64748b}
        .t3-medal{font-size:20px;margin-top:5px;line-height:1}
        .rank-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;margin-bottom:6px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
        .rank-1{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#451a03}
        .rank-2{background:linear-gradient(135deg,#e2e8f0,#94a3b8);color:#1e293b}
        .rank-3{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
        .t3-name{font-size:13px;font-weight:700;color:#1e293b;margin-top:6px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
        .t3-score{font-size:16px;font-weight:900;margin-top:2px;color:#4f46e5}
        .t3-meta{font-size:10.5px;color:#94a3b8;font-weight:500;margin-top:1px}
        .t3-bar{width:100%;border-radius:8px 8px 0 0;margin-top:8px;position:relative;overflow:hidden}
        .bar-rank{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:26px;font-weight:900;opacity:.06;pointer-events:none}
        .bar-gold{background:linear-gradient(180deg,rgba(251,191,36,.22),rgba(251,191,36,.04))}
        .bar-silver{background:linear-gradient(180deg,rgba(148,163,184,.16),rgba(148,163,184,.03))}
        .bar-bronze{background:linear-gradient(180deg,rgba(245,158,11,.14),rgba(245,158,11,.02))}

        /* KHU VỰC BẢNG BÊN PHẢI */
        .list-side {
            background: #fff;
            padding: 8px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(99,102,241,.05),0 2px 8px rgba(0,0,0,.02);
            border: 1px solid rgba(99,102,241,.08);
            overflow: hidden;
        }

        /* WRAPPER */
        .table-responsive {
            width: 100%;
            overflow: hidden;
        }

        /* ĐỊNH DẠNG TABLE CHUẨN XỊN */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            table-layout: fixed;
        }

        th, td {
            padding: 8px 10px;
            font-size: 13px;
            vertical-align: middle;
        }
        th:first-child, td:first-child { width: 50px; }
        th:nth-child(3), td:nth-child(3) { width: 80px; }
        th:nth-child(4), td:nth-child(4) { width: 70px; text-align: right; }

        th {
            background: linear-gradient(135deg,#eef2ff,#f5f3ff);
            color: #4f46e5;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.05em;
            border-bottom: 2px solid rgba(99,102,241,.12);
        }

        tr {
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.2s ease;
        }
        tr:last-child { border-bottom: none; }
        tr:hover { background: #f8f7ff; }

        /* Style nổi bật dòng của Top 1, 2, 3 trong Table giống Azota */
        tr.row-rank-1 { background: linear-gradient(90deg,#fef9c3,#fffbeb); }
        tr.row-rank-2 { background-color: #f1f5f9; }
        tr.row-rank-3 { background-color: #fff7ed; }

        /* Số thứ hạng cột 1 */
        .rank-badge {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 800;
            color: #64748b;
            background: #e2e8f0;
        }
        tr.row-rank-1 .rank-badge { background: #fef3c7; color: #b45309; }
        tr.row-rank-2 .rank-badge { background: #cbd5e1; color: #334155; }
        tr.row-rank-3 .rank-badge { background: #ffedd5; color: #c2410c; }
        .rank-badge-medal{font-size:16px;line-height:1;display:inline-flex;align-items:center;justify-content:center}

        /* Cột Tên + Avatar */
        .name-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #0f172a;
            overflow: hidden;
        }
        .name-cell span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .row-ava {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            background: #e2e8f0;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
        }
        .row-ava-fb {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg,#e0e7ff,#f3e8ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #6366f1;
        }

        /* Cột Số bài & Cột Điểm */
        .count-cell { color: #475569; font-weight: 500; }
        .score-cell { background: linear-gradient(135deg,#4f46e5,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; font-weight: 800; font-size: 13.5px; }

        /* LOADING SKELETON TRONG TABLE */
        .sk { height: 16px; border-radius: 4px; background: linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 37%,#e2e8f0 63%); background-size: 400% 100%; animation: sh 1.4s ease infinite; }
        @keyframes sh { 0%{background-position:100% 50%} 100%{background-position:0% 50%} }

        /* COMPACT MODE (profile embed) */
        body.compact .hdr,
        body.compact .podium-side,
        body.compact .bg-shapes,
        body.compact .mode-select{display:none!important}
        body.compact .wrap{min-height:auto;padding-top:8px}
        body.compact .lb-layout{padding-bottom:0}
        body.compact .list-side{box-shadow:none;border:none;padding:4px}

        /* RESPONSIVE CONTAINER CONTAINER */
        @container lb (min-width: 760px) {
            .lb-layout { grid-template-columns: 380px 1fr; }
            .podium-side { display: block; position: sticky; top: 20px; }
        }

        /* TAB DROPDOWN */
        .hdr-meta{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
        .week-tag{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;background:#fff;border-radius:99px;font-size:12px;font-weight:600;color:#475569;box-shadow:0 2px 12px rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.1)}
        .week-dot{width:8px;height:8px;border-radius:50%;background:#10b981;box-shadow:0 0 6px rgba(16,185,129,.4)}
        .mode-select{padding:6px 14px;border-radius:99px;border:1.5px solid rgba(99,102,241,.15);background:#fff;font-size:12px;font-weight:600;color:#475569;cursor:pointer;outline:none;box-shadow:0 2px 12px rgba(99,102,241,.08);appearance:auto;-webkit-appearance:auto}
        .mode-select:focus{border-color:rgba(99,102,241,.35)}
        .tab-panel{display:none}
        .tab-panel.active{display:block}

        /* ONLINE TIME CELL */
        .time-cell{color:#4f46e5;font-weight:700;font-family:'Inter',monospace;font-size:13px;letter-spacing:.02em}
        .t3-time{font-size:14px;font-weight:800;color:#10b981}
    </style>
</head>
<body>
    <div class="bg-shapes"><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="wrap">
        <div class="hdr">
            <div class="hdr-stars"><h1>BẢNG XẾP HẠNG</h1></div>
            <p>Hệ thống vinh danh học viên xuất sắc</p>
            <div class="hdr-meta">
                <div class="week-tag"><span class="week-dot"></span><span id="week-label">—</span></div>
                <select class="mode-select" id="modeSelect" onchange="switchTab(this.value)">
                    <option value="score">Điểm số</option>
                    <option value="time">Thời gian online</option>
                </select>
            </div>
        </div>

        <!-- TAB: ĐIỂM SỐ -->
        <div class="tab-panel active" id="tab-score">
        <div class="lb-layout">
            
            <!-- TRÁI: BỤC VINH QUANG TỰ ĐỘNG ẨN/HIỆN THEO IFRAME -->
            <div class="podium-side">
                <div class="podium-title">🏆 Vinh danh Top 3 Tuần</div>
                <div class="top3" id="podium"></div>
            </div>

            <!-- PHẢI: BẢNG DỮ LIỆU CHUẨN ĐẸP -->
            <div class="list-side">
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 50px;">Thứ tự</th>
                                <th>Hạng tên</th>
                                <th style="width: 90px;">Bài đã làm</th>
                                <th style="width: 80px; text-align: right;">Điểm</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- LOADING SKELETON DÒNG -->
                            <tr class="ld-row"><td><div class="sk" style="width:30px"></div></td><td><div class="sk" style="width:60%"></div></td><td><div class="sk" style="width:40px"></div></td><td><div class="sk" style="width:50px; margin-left:auto"></div></td></tr>
                            <tr class="ld-row"><td><div class="sk" style="width:30px"></div></td><td><div class="sk" style="width:45%"></div></td><td><div class="sk" style="width:40px"></div></td><td><div class="sk" style="width:50px; margin-left:auto"></div></td></tr>
                            <tr class="ld-row"><td><div class="sk" style="width:30px"></div></td><td><div class="sk" style="width:50%"></div></td><td><div class="sk" style="width:40px"></div></td><td><div class="sk" style="width:50px; margin-left:auto"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
        </div>

        <!-- TAB: THỜI GIAN ONLINE -->
        <div class="tab-panel" id="tab-time">
        <div class="lb-layout">
            
            <!-- TRÁI: BỤC VINH QUANG -->
            <div class="podium-side">
                <div class="podium-title">⏰ Vinh danh Top 3 Online</div>
                <div class="top3" id="podium-time"></div>
            </div>

            <!-- PHẢI: BẢNG DỮ LIỆU -->
            <div class="list-side">
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 50px;">Thứ tự</th>
                                <th>Hạng tên</th>
                                <th style="width: 120px; text-align: right;">Thời gian online</th>
                            </tr>
                        </thead>
                        <tbody id="table-body-time">
                            <tr class="ld-row"><td><div class="sk" style="width:30px"></div></td><td><div class="sk" style="width:60%"></div></td><td><div class="sk" style="width:80px; margin-left:auto"></div></td></tr>
                            <tr class="ld-row"><td><div class="sk" style="width:30px"></div></td><td><div class="sk" style="width:45%"></div></td><td><div class="sk" style="width:80px; margin-left:auto"></div></td></tr>
                            <tr class="ld-row"><td><div class="sk" style="width:30px"></div></td><td><div class="sk" style="width:50%"></div></td><td><div class="sk" style="width:80px; margin-left:auto"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps }
          from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc }
          from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const LB_NAME = "leaderboard-lb";
        const lbApp = getApps().find(a => a.name === LB_NAME)
          || initializeApp({
            apiKey: "AIzaSyCOelxKPrcSeiLpYN2WwYPWysHwZjZLd9c",
            authDomain: "onthi12-thpttanhong.firebaseapp.com",
            projectId: "onthi12-thpttanhong",
            storageBucket: "onthi12-thpttanhong.firebasestorage.app",
            messagingSenderId: "109867981504",
            appId: "1:109867981504:web:e116346b0efcfb140cd55f",
            measurementId: "G-6EX7SBMF1K"
          }, LB_NAME);
        const db = getFirestore(lbApp);

        function getWeekKey() {
            const now = new Date();
            const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const y = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const w = Math.ceil((((d - y) / 864e5) + 1) / 7);
            return `${d.getUTCFullYear()}-W${String(w).padStart(2, '0')}`;
        }

        function esc(t) { return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        function formatTimer(totalSeconds) {
            totalSeconds = Math.max(0, Math.floor(totalSeconds));
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
        }

        function ringAva(photo, name, size, ringCls) {
            const fs = Math.round(size * .38);
            const inner = photo
                ? `<img src="${esc(photo)}" style="width:${size}px;height:${size}px" alt="">`
                : `<div class="ava-initial" style="width:${size}px;height:${size}px;font-size:${fs}px;display:flex;align-items:center;justify-content:center">${esc(name.charAt(0))}</div>`;
            return `<div class="ava-ring ${ringCls}"><div class="ava-inner">${inner}</div></div>`;
        }

        function rowAva(photo, name) {
            if (photo) return `<img class="row-ava" src="${esc(photo)}" alt="">`;
            return `<div class="row-ava-fb">${esc(name.charAt(0))}</div>`;
        }

        // ===== TAB SWITCHING =====
        window.switchTab = function(tab) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
        };

        // ===== LOAD SCORE RANKING =====
        async function load() {
            document.getElementById("week-label").textContent = getWeekKey();

            try {
                const snap = await getDocs(collection(db, "testStats"));
                const rows = [];
                for (const d of snap.docs) {
                    const s = d.data();
                    const score = Number(s.totalScore || 0);
                    if (score <= 0) continue;
                    let name = "Ẩn danh", photo = "";
                    try {
                        const u = await getDoc(doc(db, "users", d.id));
                        if (u.exists()) { const ud = u.data(); name = ud.name || ud.email || name; photo = ud.photo || ""; }
                    } catch(e) {}
                    rows.push({ name, photo, score, tests: Number(s.totalTests||0) });
                }
                rows.sort((a, b) => b.score - a.score);

                const podiumEl = document.getElementById("podium");
                const tbodyEl = document.getElementById("table-body");

                if (!rows.length) {
                    tbodyEl.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:40px; color:#94a3b8">Chưa có dữ liệu xếp hạng</td></tr>`;
                    return;
                }

                const top3 = rows.slice(0, 3);

                function buildPodium(items, layout) {
                    return layout.map(({ idx, ring, bar, avSz, barH, rank, medal }) => {
                        const u = items[idx];
                        if (!u) return '';
                        return `<div class="top3-item">
                            <div class="rank-num rank-${rank}">${rank}</div>
                            ${ringAva(u.photo, u.name, avSz, ring)}
                            <div class="t3-medal">${medal}</div>
                            <div class="t3-name" title="${esc(u.name)}">${esc(u.name)}</div>
                            <div class="t3-score">${u.score}đ</div>
                            <div class="t3-meta">${u.tests} bài thi</div>
                            <div class="t3-bar ${bar}" style="height:${barH}px"><span class="bar-rank">#${rank}</span></div>
                        </div>`;
                    }).join('');
                }

                if (top3.length === 1) {
                    podiumEl.innerHTML = buildPodium(top3, [{ idx: 0, ring: 'ring-gold', bar: 'bar-gold', avSz: 80, barH: 80, rank: 1, medal: '🥇' }]);
                } else if (top3.length === 2) {
                    podiumEl.innerHTML = buildPodium(top3, [
                        { idx: 1, ring: 'ring-silver', bar: 'bar-silver', avSz: 66, barH: 55, rank: 2, medal: '🥈' },
                        { idx: 0, ring: 'ring-gold', bar: 'bar-gold', avSz: 80, barH: 80, rank: 1, medal: '🥇' }
                    ]);
                } else {
                    podiumEl.innerHTML = buildPodium(top3, [
                        { idx: 1, ring: 'ring-silver', bar: 'bar-silver', avSz: 66, barH: 55, rank: 2, medal: '🥈' },
                        { idx: 0, ring: 'ring-gold', bar: 'bar-gold', avSz: 80, barH: 80, rank: 1, medal: '🥇' },
                        { idx: 2, ring: 'ring-bronze', bar: 'bar-bronze', avSz: 56, barH: 40, rank: 3, medal: '🥉' }
                    ]);
                }

                const medals = ['🥇', '🥈', '🥉'];
                tbodyEl.innerHTML = rows.map((u, i) => {
                    const rankNum = i + 1;
                    const specialClass = rankNum <= 3 ? `row-rank-${rankNum}` : '';
                    const rankDisplay = rankNum <= 3 ? `<span class="rank-badge-medal">${medals[rankNum - 1]}</span>` : `<span class="rank-badge">${rankNum}</span>`;
                    
                    return `<tr class="${specialClass}">
                        <td>${rankDisplay}</td>
                        <td>
                            <div class="name-cell">
                                ${rowAva(u.photo, u.name)}
                                <span title="${esc(u.name)}">${esc(u.name)}</span>
                            </div>
                        </td>
                        <td class="count-cell">${u.tests} bài</td>
                        <td class="score-cell" style="text-align: right;">${u.score}đ</td>
                    </tr>`;
                }).join('');

            } catch (e) {
                console.error("[load-score]", e);
                document.getElementById("table-body").innerHTML = `<tr><td colspan="4" style="text-align:center; padding:40px; color:#ef4444">Lỗi khi tải dữ liệu xếp hạng điểm.</td></tr>`;
            }
        }

        // ===== LOAD ONLINE TIME RANKING =====
        async function loadOnlineTime() {
            try {
                const snap = await getDocs(collection(db, "testStats"));
                const rows = [];
                const now = Date.now();
                const THRESHOLD = 45000;
                for (const d of snap.docs) {
                    try {
                        const u = await getDoc(doc(db, "users", d.id));
                        const ud = u.exists() ? u.data() : {};
                        const baseTimer = Number(ud.onlinetimer || 0);
                        let effectiveTimer = baseTimer;
                        if (ud.online && ud.lastActive && (now - ud.lastActive) < THRESHOLD && ud.onlineStartTime > 0) {
                            effectiveTimer += Math.floor((now - ud.onlineStartTime) / 1000);
                        }
                        if (effectiveTimer <= 0) continue;
                        rows.push({
                            uid: d.id,
                            name: ud.name || ud.email || "Ẩn danh",
                            photo: ud.photo || "",
                            timer: effectiveTimer
                        });
                    } catch(e) {}
                }
                rows.sort((a, b) => b.timer - a.timer);

                const podiumEl = document.getElementById("podium-time");
                const tbodyEl = document.getElementById("table-body-time");

                if (!rows.length) {
                    tbodyEl.innerHTML = `<tr><td colspan="3" style="text-align:center; padding:40px; color:#94a3b8">Chưa có dữ liệu xếp hạng</td></tr>`;
                    return;
                }

                const top3 = rows.slice(0, 3);

                function buildTimePodium(items, layout) {
                    return layout.map(({ idx, ring, bar, avSz, barH, rank, medal }) => {
                        const u = items[idx];
                        if (!u) return '';
                        return `<div class="top3-item">
                            <div class="rank-num rank-${rank}">${rank}</div>
                            ${ringAva(u.photo, u.name, avSz, ring)}
                            <div class="t3-medal">${medal}</div>
                            <div class="t3-name" title="${esc(u.name)}">${esc(u.name)}</div>
                            <div class="t3-time">${formatTimer(u.timer)}</div>
                            <div class="t3-meta">online</div>
                            <div class="t3-bar ${bar}" style="height:${barH}px"><span class="bar-rank">#${rank}</span></div>
                        </div>`;
                    }).join('');
                }

                if (top3.length === 1) {
                    podiumEl.innerHTML = buildTimePodium(top3, [{ idx: 0, ring: 'ring-gold', bar: 'bar-gold', avSz: 80, barH: 80, rank: 1, medal: '🥇' }]);
                } else if (top3.length === 2) {
                    podiumEl.innerHTML = buildTimePodium(top3, [
                        { idx: 1, ring: 'ring-silver', bar: 'bar-silver', avSz: 66, barH: 55, rank: 2, medal: '🥈' },
                        { idx: 0, ring: 'ring-gold', bar: 'bar-gold', avSz: 80, barH: 80, rank: 1, medal: '🥇' }
                    ]);
                } else {
                    podiumEl.innerHTML = buildTimePodium(top3, [
                        { idx: 1, ring: 'ring-silver', bar: 'bar-silver', avSz: 66, barH: 55, rank: 2, medal: '🥈' },
                        { idx: 0, ring: 'ring-gold', bar: 'bar-gold', avSz: 80, barH: 80, rank: 1, medal: '🥇' },
                        { idx: 2, ring: 'ring-bronze', bar: 'bar-bronze', avSz: 56, barH: 40, rank: 3, medal: '🥉' }
                    ]);
                }

                const medals = ['🥇', '🥈', '🥉'];
                tbodyEl.innerHTML = rows.map((u, i) => {
                    const rankNum = i + 1;
                    const specialClass = rankNum <= 3 ? `row-rank-${rankNum}` : '';
                    const rankDisplay = rankNum <= 3 ? `<span class="rank-badge-medal">${medals[rankNum - 1]}</span>` : `<span class="rank-badge">${rankNum}</span>`;

                    return `<tr class="${specialClass}">
                        <td>${rankDisplay}</td>
                        <td>
                            <div class="name-cell">
                                ${rowAva(u.photo, u.name)}
                                <span title="${esc(u.name)}">${esc(u.name)}</span>
                            </div>
                        </td>
                        <td class="time-cell" style="text-align: right;">${formatTimer(u.timer)}</td>
                    </tr>`;
                }).join('');

            } catch (e) {
                console.error("[load-online-time]", e);
                document.getElementById("table-body-time").innerHTML = `<tr><td colspan="3" style="text-align:center; padding:40px; color:#ef4444">Lỗi khi tải dữ liệu xếp hạng thời gian.</td></tr>`;
            }
        }

        if (new URLSearchParams(location.search).get("compact") === "1") document.body.classList.add("compact");
        load();
        loadOnlineTime();
    </script>
</body>
