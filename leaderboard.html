<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Xếp Hạng - LearnHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 text-center text-white">
            <h1 class="text-3xl font-bold uppercase tracking-wider mb-2 flex justify-center items-center gap-2">
                <i class="fas fa-trophy text-yellow-300 animate-bounce"></i> VIP LEADERBOARD 🏆
            </h1>
            <p class="text-blue-100 text-sm">Hệ thống vinh danh học viên LearnHub</p>
        </div>

        <div class="flex border-b border-gray-200 bg-gray-50">
            <button id="tab-current" class="w-1/2 py-4 text-center font-semibold text-sm border-b-2 border-blue-600 text-blue-600 transition-all focus:outline-none">
                <i class="fas fa-calendar-day mr-1"></i> Tuần này
            </button>
            <button id="tab-history" class="w-1/2 py-4 text-center font-semibold text-sm text-gray-500 border-b-2 border-transparent hover:text-gray-700 hover:border-gray-300 transition-all focus:outline-none">
                <i class="fas fa-history mr-1"></i> Tuần trước
            </button>
        </div>

        <div id="loading" class="p-10 text-center text-gray-500">
            <i class="fas fa-spinner fa-spin text-3xl text-indigo-600 mb-2"></i>
            <p id="loading-text">Đang tải bảng xếp hạng tuần này...</p>
        </div>

        <div id="leaderboard-content" class="hidden p-6">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b-2 border-gray-100 text-gray-600 uppercase text-xs font-semibold tracking-wider">
                            <th class="py-3 px-4 text-center">Hạng</th>
                            <th class="py-3 px-4">Học viên</th>
                            <th class="py-3 px-4 text-center" id="th-extra">Số bài</th>
                            <th class="py-3 px-4 text-center">Điểm số</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-rows" class="divide-y divide-gray-100 text-gray-700">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCOelxKPrcSeiLpYN2WwYPWysHwZjZLd9c", 
            authDomain: "onthi12-thpttanhong.firebaseapp.com",
            projectId: "onthi12-thpttanhong",
            storageBucket: "onthi12-thpttanhong.appspot.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentTab = "current"; // "current" hoặc "history"

        // Hàm tính toán mã tuần tự động (Hỗ trợ tìm tuần trước)
        function getWeekKeys() {
            const now = new Date();
            const oneJan = new Date(now.getFullYear(), 0, 1);
            const numberOfDays = Math.floor((now - oneJan) / (24 * 60 * 60 * 1000));
            const currentWeekNum = Math.ceil((numberOfDays + oneJan.getDay() + 1) / 7);
            
            const currentWeekKey = `${now.getFullYear()}-W${String(currentWeekNum).padStart(2, '0')}`;
            const prevWeekKey = `${now.getFullYear()}-W${String(currentWeekNum - 1).padStart(2, '0')}`;
            
            return { current: currentWeekKey, previous: prevWeekKey };
        }

        async function fetchAndRender(mode) {
            const rowsContainer = document.getElementById("leaderboard-rows");
            const loadingElement = document.getElementById("loading");
            const contentElement = document.getElementById("leaderboard-content");
            const loadingText = document.getElementById("loading-text");
            const thExtra = document.getElementById("th-extra");

            loadingElement.classList.remove("hidden");
            contentElement.classList.add("hidden");
            rowsContainer.innerHTML = "";

            const weeks = getWeekKeys();

            try {
                let listData = [];

                if (mode === "current") {
                    loadingText.innerText = "Đang tải dữ liệu tuần này...";
                    thExtra.innerText = "Số bài";

                    // Đọc từ bảng testStats thời gian thực
                    const q = query(collection(db, "testStats"), orderBy("weekScore", "desc"), limit(10));
                    const snap = await getDocs(q);
                    
                    for (const d of snap.docs) {
                        const stat = d.data();
                        let displayName = "Học viên ẩn danh";
                        if (stat.uid) {
                            try {
                                const uSnap = await getDoc(doc(db, "users", stat.uid));
                                if (uSnap.exists()) displayName = uSnap.data().name || displayName;
                            } catch (e) {}
                        }
                        listData.push({
                            name: displayName,
                            score: stat.weekScore || 0,
                            extra: stat.totalTests || 0
                        });
                    }
                } else {
                    loadingText.innerText = `Đang tìm dữ liệu vinh danh tuần trước (${weeks.previous})...`;
                    thExtra.innerText = "Mã Tuần";

                    // Đọc từ bảng weeklyWinners chốt sẵn của tuần trước
                    const winnerDocRef = doc(db, "weeklyWinners", weeks.previous);
                    const winnerSnap = await getDoc(winnerDocRef);

                    if (winnerSnap.exists() && winnerSnap.data().top) {
                        const topArr = winnerSnap.data().top; // Mảng chứa [{uid, name, weekScore}, ...]
                        for (const winner of topArr) {
                            listData.push({
                                name: winner.name || "Học viên vinh danh",
                                score: winner.weekScore || 0,
                                extra: weeks.previous
                            });
                        }
                    }
                }

                // Render giao diện
                let htmlRows = "";
                let rank = 1;

                if (listData.length === 0) {
                    htmlRows = `<tr><td colspan="4" class="text-center py-8 text-gray-400">Không có dữ liệu xếp hạng cho mục này.</td></tr>`;
                } else {
                    listData.forEach((item) => {
                        let rankDisplay = rank;
                        let rowBg = "";
                        if (rank === 1) {
                            rankDisplay = `<i class="fas fa-medal text-yellow-500 text-xl"></i>`;
                            rowBg = "bg-yellow-50/40 font-semibold";
                        } else if (rank === 2) {
                            rankDisplay = `<i class="fas fa-medal text-gray-400 text-xl"></i>`;
                            rowBg = "bg-gray-50/40";
                        } else if (rank === 3) {
                            rankDisplay = `<i class="fas fa-medal text-amber-600 text-xl"></i>`;
                            rowBg = "bg-amber-50/40";
                        }

                        htmlRows += `
                            <tr class="hover:bg-indigo-50/30 transition-colors ${rowBg}">
                                <td class="py-4 px-4 text-center font-bold text-gray-600">${rankDisplay}</td>
                                <td class="py-4 px-4 flex items-center gap-2">
                                    <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-xs uppercase">
                                        ${item.name.charAt(0)}
                                    </div>
                                    <span class="font-medium text-gray-900">${item.name}</span>
                                </td>
                                <td class="py-4 px-4 text-center text-sm text-gray-400">${item.extra}</td>
                                <td class="py-4 px-4 text-center text-indigo-600 font-bold">${item.score}đ</td>
                            </tr>
                        `;
                        rank++;
                    });
                }

                rowsContainer.innerHTML = htmlRows;
                loadingElement.classList.add("hidden");
                contentElement.classList.remove("hidden");

            } catch (error) {
                console.error("Lỗi tải dữ liệu:", error);
                loadingElement.innerHTML = `<p class="text-red-500">Gặp sự cố khi kết nối dữ liệu.</p>`;
            }
        }

        // Cài đặt sự kiện chuyển đổi Tab
        document.getElementById("tab-current").addEventListener("click", (e) => {
            currentTab = "current";
            e.target.className = "w-1/2 py-4 text-center font-semibold text-sm border-b-2 border-blue-600 text-blue-600 transition-all focus:outline-none";
            document.getElementById("tab-history").className = "w-1/2 py-4 text-center font-semibold text-sm text-gray-500 border-b-2 border-transparent hover:text-gray-700 hover:border-gray-300 transition-all focus:outline-none";
            fetchAndRender("current");
        });

        document.getElementById("tab-history").addEventListener("click", (e) => {
            currentTab = "history";
            e.target.className = "w-1/2 py-4 text-center font-semibold text-sm border-b-2 border-blue-600 text-blue-600 transition-all focus:outline-none";
            document.getElementById("tab-current").className = "w-1/2 py-4 text-center font-semibold text-sm text-gray-500 border-b-2 border-transparent hover:text-gray-700 hover:border-gray-300 transition-all focus:outline-none";
            fetchAndRender("history");
        });

        // Khởi động load trang ban đầu
        window.addEventListener("DOMContentLoaded", () => fetchAndRender("current"));
    </script>
</body>
</html>
