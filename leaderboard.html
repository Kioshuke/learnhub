<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Xếp Hạng - LearnHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;min-height:100vh;-webkit-font-smoothing:antialiased;color:#1e293b}
        ::-webkit-scrollbar{width:5px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

        .wrap{max-width:860px;margin:0 auto;min-height:100vh;padding:0 24px}

        /* HEADER */
        .hdr{text-align:center;padding:36px 0 28px;position:relative}
        .hdr::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:400px;height:300px;background:radial-gradient(ellipse,rgba(99,102,241,.08),transparent 65%);pointer-events:none}
        .hdr-icon{font-size:44px;margin-bottom:6px;filter:drop-shadow(0 2px 8px rgba(251,191,36,.3))}
        .hdr h1{font-size:26px;font-weight:900;color:#0f172a;letter-spacing:-.03em}
        .hdr p{font-size:13px;color:#64748b;font-weight:500;margin-top:3px}
        .week-tag{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:5px 14px;background:#fff;border:1px solid #e2e8f0;border-radius:999px;font-size:11.5px;font-weight:600;color:#64748b}
        .week-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.4)}

        /* TOP 3 */
        .top3{display:flex;justify-content:center;align-items:flex-end;gap:14px}
        .top3-item{display:flex;flex-direction:column;align-items:center;flex:1;max-width:220px}

        /* RING AVATAR — no absolute, uses padding as ring thickness */
        .ava-ring{display:inline-block;border-radius:50%;padding:3px;line-height:0}
        .ring-gold{background:linear-gradient(135deg,#fbbf24,#f59e0b)}
        .ring-silver{background:linear-gradient(135deg,#cbd5e1,#94a3b8)}
        .ring-bronze{background:linear-gradient(135deg,#f59e0b,#d97706)}
        .ava-inner{border-radius:50%;overflow:hidden;background:#e2e8f0;display:flex;align-items:center;justify-content:center}
        .ava-inner img{width:100%;height:100%;object-fit:cover;display:block}
        .ava-initial{font-weight:900;color:#64748b}

        .t3-badge{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:11px;font-weight:800;margin-bottom:8px}
        .badge-gold{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#451a03;box-shadow:0 2px 8px rgba(251,191,36,.3)}
        .badge-silver{background:linear-gradient(135deg,#e2e8f0,#94a3b8);color:#1e293b;box-shadow:0 2px 8px rgba(148,163,184,.25)}
        .badge-bronze{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;box-shadow:0 2px 8px rgba(245,158,11,.25)}

        .t3-name{font-size:13px;font-weight:700;color:#1e293b;margin-top:10px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
        .t3-score{font-size:18px;font-weight:900;margin-top:3px;letter-spacing:-.02em}
        .t3-meta{font-size:10.5px;color:#94a3b8;font-weight:500;margin-top:1px}

        .t3-bar{width:100%;border-radius:10px 10px 0 0;margin-top:10px}
        .bar-gold{background:linear-gradient(180deg,rgba(251,191,36,.18),rgba(251,191,36,.04))}
        .bar-silver{background:linear-gradient(180deg,rgba(148,163,184,.14),rgba(148,163,184,.03))}
        .bar-bronze{background:linear-gradient(180deg,rgba(245,158,11,.14),rgba(245,158,11,.03))}

        /* DIVIDER */
        .divider{height:1px;background:#e2e8f0;margin:24px 0}

        /* TABLE */
        .tbl-hdr{display:grid;grid-template-columns:44px 40px 1fr 80px 90px;align-items:center;padding:0 14px 10px;border-bottom:1px solid #e2e8f0}
        .tbl-th{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em}
        .tbl-row{display:grid;grid-template-columns:44px 40px 1fr 80px 90px;align-items:center;padding:10px 14px;border-radius:8px;margin:1px 0;transition:background .12s}
        .tbl-row:hover{background:#e8edf3}
        .td-rank{font-size:13px;font-weight:700;color:#94a3b8}
        .td-name{font-size:13px;font-weight:600;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px}
        .td-tests{font-size:11.5px;color:#94a3b8;font-weight:500}
        .td-score{font-size:15px;font-weight:800;color:#6366f1;text-align:right;letter-spacing:-.01em}

        /* ROW AVATAR */
        .row-ava{width:36px;height:36px;border-radius:50%;object-fit:cover;display:block;background:#e2e8f0}
        .row-ava-fb{width:36px;height:36px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#94a3b8;flex-shrink:0}

        /* EMPTY */
        .empty{text-align:center;padding:56px 16px}
        .empty-icon{font-size:44px;margin-bottom:10px;opacity:.5}
        .empty-text{color:#94a3b8;font-size:13px;font-weight:500}

        /* SKELETON */
        .sk{border-radius:8px;background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 37%,#e2e8f0 63%);background-size:400% 100%;animation:sh 1.4s ease infinite}
        @keyframes sh{0%{background-position:100% 50%}100%{background-position:0% 50%}}
        .sk-c{border-radius:50%}
        .sk-row{display:grid;grid-template-columns:44px 40px 1fr 80px 90px;align-items:center;padding:10px 14px}

        /* RESPONSIVE */
        @media(max-width:600px){
            .wrap{padding:0 12px}
            .hdr{padding:24px 0 18px}
            .hdr h1{font-size:20px}
            .top3{gap:8px}
            .t3-name{font-size:12px}
            .t3-score{font-size:15px}
            .tbl-hdr,.tbl-row,.sk-row{grid-template-columns:36px 34px 1fr 60px 72px;padding:8px 8px}
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="hdr">
            <div class="hdr-icon">🏆</div>
            <h1>BẢNG XẾP HẠNG</h1>
            <p>Hệ thống vinh danh học viên xuất sắc</p>
            <div class="week-tag"><span class="week-dot"></span><span id="week-label">—</span></div>
        </div>

        <!-- LOADING -->
        <div id="ld">
            <div class="top3">
                <div class="top3-item" style="align-self:flex-end">
                    <div class="sk sk-c" style="width:72px;height:72px"></div>
                    <div class="sk" style="width:60px;height:10px;margin-top:10px"></div>
                    <div class="sk" style="width:36px;height:12px;margin-top:5px"></div>
                    <div class="sk bar-silver" style="width:100%;height:44px;margin-top:10px;border-radius:10px 10px 0 0"></div>
                </div>
                <div class="top3-item">
                    <div class="sk sk-c" style="width:92px;height:92px"></div>
                    <div class="sk" style="width:70px;height:10px;margin-top:10px"></div>
                    <div class="sk" style="width:44px;height:12px;margin-top:5px"></div>
                    <div class="sk bar-gold" style="width:100%;height:64px;margin-top:10px;border-radius:10px 10px 0 0"></div>
                </div>
                <div class="top3-item" style="align-self:flex-end">
                    <div class="sk sk-c" style="width:62px;height:62px"></div>
                    <div class="sk" style="width:50px;height:10px;margin-top:10px"></div>
                    <div class="sk" style="width:32px;height:12px;margin-top:5px"></div>
                    <div class="sk bar-bronze" style="width:100%;height:32px;margin-top:10px;border-radius:10px 10px 0 0"></div>
                </div>
            </div>
            <div class="divider"></div>
            <div>
                <div class="sk-row"><div class="sk" style="width:24px;height:10px"></div><div class="sk sk-c" style="width:36px;height:36px"></div><div class="sk" style="height:10px"></div><div class="sk" style="width:40px;height:10px"></div><div class="sk" style="width:44px;height:12px"></div></div>
                <div class="sk-row"><div class="sk" style="width:24px;height:10px"></div><div class="sk sk-c" style="width:36px;height:36px"></div><div class="sk" style="height:10px"></div><div class="sk" style="width:40px;height:10px"></div><div class="sk" style="width:44px;height:12px"></div></div>
                <div class="sk-row"><div class="sk" style="width:24px;height:10px"></div><div class="sk sk-c" style="width:36px;height:36px"></div><div class="sk" style="height:10px"></div><div class="sk" style="width:40px;height:10px"></div><div class="sk" style="width:44px;height:12px"></div></div>
            </div>
        </div>

        <!-- CONTENT -->
        <div id="ct" style="display:none">
            <div class="top3" id="podium"></div>
            <div class="divider"></div>
            <div>
                <div class="tbl-hdr">
                    <div class="tbl-th">Hạng</div>
                    <div></div>
                    <div class="tbl-th">Học viên</div>
                    <div class="tbl-th">Bài thi</div>
                    <div class="tbl-th" style="text-align:right">Điểm</div>
                </div>
                <div id="list"></div>
            </div>
        </div>

        <!-- EMPTY -->
        <div id="em" style="display:none">
            <div class="empty">
                <div class="empty-icon">📊</div>
                <div class="empty-text">Chưa có dữ liệu xếp hạng</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOelxKPrcSeiLpYN2WwYPWysHwZjZLd9c",
            authDomain: "onthi12-thpttanhong.firebaseapp.com",
            projectId: "onthi12-thpttanhong",
            storageBucket: "onthi12-thpttanhong.appspot.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function getWeekKey() {
            const now = new Date();
            const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const y = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const w = Math.ceil((((d - y) / 864e5) + 1) / 7);
            return `${d.getUTCFullYear()}-W${String(w).padStart(2, '0')}`;
        }

        function esc(t) { return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        function ringAva(photo, name, size, ringCls) {
            const fs = Math.round(size * .38);
            const inner = photo
                ? `<img src="${esc(photo)}" style="width:${size}px;height:${size}px" alt="">`
                : `<div class="ava-initial" style="width:${size}px;height:${size}px;font-size:${fs}px;display:flex;align-items:center;justify-content:center">${esc(name.charAt(0))}</div>`;
            return `<div class="ava-ring ${ringCls}"><div class="ava-inner">${inner}</div></div>`;
        }

        function rowAva(photo, name) {
            if (photo) return `<img class="row-ava" src="${esc(photo)}" alt="">`;
            return `<div class="row-ava-fb">${esc(name.charAt(0))}</div>`;
        }

        async function load() {
            document.getElementById("week-label").textContent = getWeekKey();

            try {
                const snap = await getDocs(collection(db, "testStats"));
                const rows = [];
                for (const d of snap.docs) {
                    const s = d.data();
                    const score = Number(s.totalScore || 0);
                    if (score <= 0) continue;
                    let name = "Ẩn danh", photo = "";
                    try {
                        const u = await getDoc(doc(db, "users", d.id));
                        if (u.exists()) { const ud = u.data(); name = ud.name || ud.email || name; photo = ud.photo || ""; }
                    } catch(e) {}
                    rows.push({ name, photo, score, tests: Number(s.totalTests||0), best: Number(s.bestScore||0) });
                }
                rows.sort((a, b) => b.score - a.score);

                if (!rows.length) {
                    document.getElementById("ld").style.display = "none";
                    document.getElementById("em").style.display = "block";
                    return;
                }

                const podiumEl = document.getElementById("podium");
                const listEl = document.getElementById("list");
                const top3 = rows.slice(0, 3);

                function buildPodium(items, layout) {
                    return layout.map(({ idx, rank, ring, bar, avSz, barH, align }) => {
                        const u = items[idx];
                        return `<div class="top3-item" ${align ? 'style="align-self:flex-end"' : ''}>
                            <div class="t3-badge ${rank.cls}">${rank.num}</div>
                            ${ringAva(u.photo, u.name, avSz, ring)}
                            <div class="t3-name">${esc(u.name)}</div>
                            <div class="t3-score" style="color:${rank.color}">${u.score}đ</div>
                            <div class="t3-meta">${u.tests} bài · Cao nhất ${u.best}đ</div>
                            <div class="t3-bar ${bar}" style="height:${barH}px"></div>
                        </div>`;
                    }).join('');
                }

                if (top3.length === 1) {
                    podiumEl.innerHTML = buildPodium(top3, [{
                        idx: 0, rank: { num: 1, cls: 'badge-gold', color: '#d97706' },
                        ring: 'ring-gold', bar: 'bar-gold', avSz: 84, barH: 56, align: false
                    }]);
                } else if (top3.length === 2) {
                    podiumEl.innerHTML = buildPodium(top3, [
                        { idx: 1, rank: { num: 2, cls: 'badge-silver', color: '#64748b' }, ring: 'ring-silver', bar: 'bar-silver', avSz: 68, barH: 38, align: true },
                        { idx: 0, rank: { num: 1, cls: 'badge-gold', color: '#d97706' }, ring: 'ring-gold', bar: 'bar-gold', avSz: 90, barH: 60, align: false }
                    ]);
                } else {
                    podiumEl.innerHTML = buildPodium(top3, [
                        { idx: 1, rank: { num: 2, cls: 'badge-silver', color: '#64748b' }, ring: 'ring-silver', bar: 'bar-silver', avSz: 72, barH: 42, align: true },
                        { idx: 0, rank: { num: 1, cls: 'badge-gold', color: '#d97706' }, ring: 'ring-gold', bar: 'bar-gold', avSz: 96, barH: 64, align: false },
                        { idx: 2, rank: { num: 3, cls: 'badge-bronze', color: '#b45309' }, ring: 'ring-bronze', bar: 'bar-bronze', avSz: 62, barH: 28, align: true }
                    ]);
                }

                const rest = rows.slice(3);
                listEl.innerHTML = rest.length ? rest.map((u, i) => `<div class="tbl-row">
                    <div class="td-rank">#${i + 4}</div>
                    ${rowAva(u.photo, u.name)}
                    <div class="td-name" title="${esc(u.name)}">${esc(u.name)}</div>
                    <div class="td-tests">${u.tests} bài</div>
                    <div class="td-score">${u.score}đ</div>
                </div>`).join('') : '';

                document.getElementById("ld").style.display = "none";
                document.getElementById("ct").style.display = "block";

            } catch (e) {
                console.error(e);
                document.getElementById("ld").innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Lỗi tải dữ liệu</div></div>`;
            }
        }

        document.addEventListener("DOMContentLoaded", load);
    </script>
</body>
</html>
