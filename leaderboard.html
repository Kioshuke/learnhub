<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Xếp Hạng - LearnHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: transparent; /* Đổi thành trong suốt để tiệp màu với khung modal cha */
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        /* Ẩn thanh cuộn xám (scrollbar) cho toàn bộ trình duyệt (Chrome, Safari, Edge, Firefox) */
        ::-webkit-scrollbar {
            display: none;
        }
        html, body {
            -ms-overflow-style: none;  /* IE và Edge */
            scrollbar-width: none;  /* Firefox */
        }
        /* ===== SKELETON LOADING ===== */
        @keyframes skeletonShimmer {
            0% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .skel-bar {
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 37%, #e5e7eb 63%);
            background-size: 400% 100%;
            animation: skeletonShimmer 1.4s ease infinite;
            border-radius: 6px;
            display: inline-block;
        }
    </style>
</head>
<body class="w-full h-full antialiased">

    <!-- Bung full bề ngang (w-full), loại bỏ viền bo ngoài to và bóng đổ nặng để khớp giao diện nhúng -->
    <div class="w-full min-h-screen bg-white rounded-xl overflow-hidden flex flex-col">
        
        <!-- Tinh giản ô tiêu đề gọn gàng, giảm padding, thu nhỏ font chữ -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 px-4 py-3.5 text-center text-white flex flex-col items-center justify-center gap-0.5">
            <h1 class="text-xl font-bold uppercase tracking-wide flex justify-center items-center gap-2">
                <i class="fas fa-trophy text-yellow-300 text-base"></i> LEARNHUB LEADERBOARD 🏆
            </h1>
            <p class="text-blue-100/90 text-xs font-medium">Hệ thống vinh danh học viên LearnHub</p>
        </div>

        <!-- Thanh Tab tinh chỉnh khít và mượt hơn -->
        <div class="flex border-b border-gray-100 bg-gray-50/80">
            <button id="tab-current" class="w-full py-3 text-center font-bold text-xs uppercase tracking-wider border-b-2 border-blue-600 text-blue-600 transition-all focus:outline-none">
                <i class="fas fa-calendar-day mr-1"></i> Tuần này <span id="current-week-id" class="ml-1 text-[10px] opacity-80"></span>
            </button>
        </div>

        <!-- Khung nội dung bảng xếp hạng tự động cuộn không lộ thanh xám -->
        <div class="flex-1 overflow-y-auto px-3 py-2">
            
            <div id="loading" class="py-2">
                <table class="w-full text-left border-collapse">
                    <tbody class="divide-y divide-gray-50">
                        <tr>
                            <td class="py-3 px-2 text-center w-14"><div class="skel-bar mx-auto" style="width:20px;height:20px;border-radius:9999px;"></div></td>
                            <td class="py-3 px-2"><div class="flex items-center gap-2"><div class="skel-bar" style="width:24px;height:24px;border-radius:9999px;flex-shrink:0;"></div><div class="skel-bar" style="width:90px;height:12px;"></div></div></td>
                            <td class="py-3 px-2 text-center w-16"><div class="skel-bar mx-auto" style="width:22px;height:12px;"></div></td>
                            <td class="py-3 px-2 text-center w-20"><div class="skel-bar mx-auto" style="width:36px;height:14px;"></div></td>
                        </tr>
                        <tr>
                            <td class="py-3 px-2 text-center w-14"><div class="skel-bar mx-auto" style="width:20px;height:20px;border-radius:9999px;"></div></td>
                            <td class="py-3 px-2"><div class="flex items-center gap-2"><div class="skel-bar" style="width:24px;height:24px;border-radius:9999px;flex-shrink:0;"></div><div class="skel-bar" style="width:110px;height:12px;"></div></div></td>
                            <td class="py-3 px-2 text-center w-16"><div class="skel-bar mx-auto" style="width:22px;height:12px;"></div></td>
                            <td class="py-3 px-2 text-center w-20"><div class="skel-bar mx-auto" style="width:36px;height:14px;"></div></td>
                        </tr>
                        <tr>
                            <td class="py-3 px-2 text-center w-14"><div class="skel-bar mx-auto" style="width:20px;height:20px;border-radius:9999px;"></div></td>
                            <td class="py-3 px-2"><div class="flex items-center gap-2"><div class="skel-bar" style="width:24px;height:24px;border-radius:9999px;flex-shrink:0;"></div><div class="skel-bar" style="width:75px;height:12px;"></div></div></td>
                            <td class="py-3 px-2 text-center w-16"><div class="skel-bar mx-auto" style="width:22px;height:12px;"></div></td>
                            <td class="py-3 px-2 text-center w-20"><div class="skel-bar mx-auto" style="width:36px;height:14px;"></div></td>
                        </tr>
                        <tr>
                            <td class="py-3 px-2 text-center w-14"><div class="skel-bar mx-auto" style="width:20px;height:20px;border-radius:9999px;"></div></td>
                            <td class="py-3 px-2"><div class="flex items-center gap-2"><div class="skel-bar" style="width:24px;height:24px;border-radius:9999px;flex-shrink:0;"></div><div class="skel-bar" style="width:100px;height:12px;"></div></div></td>
                            <td class="py-3 px-2 text-center w-16"><div class="skel-bar mx-auto" style="width:22px;height:12px;"></div></td>
                            <td class="py-3 px-2 text-center w-20"><div class="skel-bar mx-auto" style="width:36px;height:14px;"></div></td>
                        </tr>
                        <tr>
                            <td class="py-3 px-2 text-center w-14"><div class="skel-bar mx-auto" style="width:20px;height:20px;border-radius:9999px;"></div></td>
                            <td class="py-3 px-2"><div class="flex items-center gap-2"><div class="skel-bar" style="width:24px;height:24px;border-radius:9999px;flex-shrink:0;"></div><div class="skel-bar" style="width:85px;height:12px;"></div></div></td>
                            <td class="py-3 px-2 text-center w-16"><div class="skel-bar mx-auto" style="width:22px;height:12px;"></div></td>
                            <td class="py-3 px-2 text-center w-20"><div class="skel-bar mx-auto" style="width:36px;height:14px;"></div></td>
                        </tr>
                    </tbody>
                </table>
                <p id="loading-text" class="text-[10px] font-medium text-center text-gray-400 mt-1">Đang tải bảng xếp hạng tuần này...</p>
            </div>

            <div id="leaderboard-content" class="hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-100 text-gray-400 uppercase text-[10px] font-bold tracking-widest">
                            <th class="py-2.5 px-2 text-center w-14">Hạng</th>
                            <th class="py-2.5 px-2">Học viên</th>
                            <th class="py-2.5 px-2 text-center w-16" id="th-extra">Số bài</th>
                            <th class="py-2.5 px-2 text-center w-20">Điểm số</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-rows" class="divide-y divide-gray-50 text-gray-700 text-sm">
                        <!-- Data đổ vào đây -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOelxKPrcSeiLpYN2WwYPWysHwZjZLd9c", 
            authDomain: "onthi12-thpttanhong.firebaseapp.com",
            projectId: "onthi12-thpttanhong",
            storageBucket: "onthi12-thpttanhong.appspot.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentTab = "current";

        function getWeekKeys() {
            const now = new Date();
            const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const currentWeekNum = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            
            const currentWeekKey = `${d.getUTCFullYear()}-W${String(currentWeekNum).padStart(2, '0')}`;
            
            const currentTxt = document.getElementById("current-week-id");
            if (currentTxt) currentTxt.innerText = `(${currentWeekKey})`;
            
            return { current: currentWeekKey };
        }

        async function fetchAndRender() {
            const rowsContainer = document.getElementById("leaderboard-rows");
            const loadingElement = document.getElementById("loading");
            const contentElement = document.getElementById("leaderboard-content");
            const loadingText = document.getElementById("loading-text");
            const thExtra = document.getElementById("th-extra");

            loadingElement.classList.remove("hidden");
            contentElement.classList.add("hidden");
            rowsContainer.innerHTML = "";

            const weeks = getWeekKeys();

            try {
                let listData = [];

                loadingText.innerText = "Đang tải dữ liệu tuần này...";
                thExtra.innerText = "Số bài";

                const q = query(collection(db, "testStats"), orderBy("weekScore", "desc"), limit(10));
                const snap = await getDocs(q);
                
                for (const d of snap.docs) {
                    const stat = d.data();
                    let displayName = "Học viên ẩn danh";
                    if (stat.uid) {
                        try {
                            const uSnap = await getDoc(doc(db, "users", stat.uid));
                            if (uSnap.exists()) displayName = uSnap.data().name || displayName;
                        } catch (e) {}
                    }
                    listData.push({
                        name: displayName,
                        score: stat.weekScore || 0,
                        extra: stat.weeklyTests || 0
                    });
                }

                let htmlRows = "";
                let rank = 1;

                if (listData.length === 0) {
                    htmlRows = `<tr><td colspan="4" class="text-center py-6 text-gray-400 text-xs">Không có dữ liệu xếp hạng.</td></tr>`;
                } else {
                    listData.forEach((item) => {
                        let rankDisplay = rank;
                        let rowBg = "";
                        if (rank === 1) {
                            rankDisplay = `<i class="fas fa-medal text-yellow-500 text-base"></i>`;
                            rowBg = "bg-yellow-50/30 font-semibold";
                        } else if (rank === 2) {
                            rankDisplay = `<i class="fas fa-medal text-gray-400 text-base"></i>`;
                            rowBg = "bg-gray-50/30";
                        } else if (rank === 3) {
                            rankDisplay = `<i class="fas fa-medal text-amber-600 text-base"></i>`;
                            rowBg = "bg-amber-50/30";
                        }

                        htmlRows += `
                            <tr class="hover:bg-indigo-50/20 transition-colors ${rowBg}">
                                <td class="py-3 px-2 text-center font-bold text-gray-500">${rankDisplay}</td>
                                <td class="py-3 px-2 flex items-center gap-2 max-w-[140px]">
                                    <div class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-[10px] uppercase flex-shrink-0">
                                        ${item.name.charAt(0)}
                                    </div>
                                    <span class="font-medium text-gray-800 truncate block w-full" title="${item.name}">${item.name}</span>
                                </td>
                                <td class="py-3 px-2 text-center text-xs text-gray-400 font-medium">${item.extra}</td>
                                <td class="py-3 px-2 text-center text-indigo-600 font-bold">${item.score}đ</td>
                            </tr>
                        `;
                        rank++;
                    });
                }

                rowsContainer.innerHTML = htmlRows;
                loadingElement.classList.add("hidden");
                contentElement.classList.remove("hidden");

            } catch (error) {
                console.error("Lỗi tải dữ liệu:", error);
                loadingElement.innerHTML = `<p class="text-red-500 text-xs py-4">Gặp sự cố khi kết nối dữ liệu.</p>`;
            }
        }

        window.addEventListener("DOMContentLoaded", () => fetchAndRender());
    </script>
</body>
</html>
