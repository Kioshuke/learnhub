<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnHub Login UI</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Inter', 'Segoe UI', sans-serif;
}

body{
  height:100vh;
  display:flex;
  background:#f9fafb;
}

/* LEFT */
.login-left{
  width:42%;
  background:#ffffff;
  padding:60px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:40px;
}

.logo img{
  width:42px;
}

.logo span{
  font-size:20px;
  font-weight:700;
  color:#2563eb;
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:25px;
}

.tab{
  flex:1;
  padding:10px;
  text-align:center;
  border-radius:10px;
  background:#f3f4f6;
  cursor:pointer;
  font-weight:500;
  transition:.2s;
}

.tab.active{
  background:#2563eb;
  color:white;
}

/* TITLE */
.login-left h2{
  font-size:32px;
  margin-bottom:20px;
}

/* BUTTON */
.login-btn{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border-radius:14px;
  border:1px solid #e5e7eb;
  background:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-size:15px;
  transition:all .25s;
  box-shadow:0 4px 10px rgba(0,0,0,0.04);
}

.login-btn:hover{
  transform:translateY(-3px) scale(1.01);
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
.input-group{
  position:relative;
  margin-bottom:18px;
}

.input-group input{
  width:100%;
  padding:14px 12px;
  border-radius:12px;
  border:1px solid #d1d5db;
  outline:none;
  font-size:14px;
  background:white;
}

.input-group label{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  background:white;
  padding:0 5px;
  color:#9ca3af;
  font-size:14px;
  transition:.2s;
  pointer-events:none;
}

.input-group input:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

.input-group input:focus + label,
.input-group input:valid + label{
  top:-8px;
  font-size:12px;
  color:#2563eb;
}
/* INPUT */
.input{
  width:100%;
  padding:13px;
  border-radius:10px;
  border:1px solid #d1d5db;
  margin-bottom:15px;
}

.input:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,0.15);
  outline:none;
}

/* SUBMIT */
.login-submit{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* DIVIDER */
.login-divider{
  text-align:center;
  margin:20px 0;
  color:#9ca3af;
}

/* FOOTER */
.login-footer{
  margin-top:20px;
  font-size:13px;
  text-align:center;
  color:#6b7280;
}

/* RIGHT */
.login-right{
  width:58%;
  position:relative;
  overflow:hidden;
}

/* SLIDE */
.slide{
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
  opacity:0;
  transform:scale(1.05); /* 👈 zoom sẵn */
  transition:opacity 1s ease, transform 3s ease;
}

.slide.active{
  opacity:1;
  transform:scale(1); /* 👈 zoom về bình thường */
}
/* nền blur */
.bg-blur{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  filter:blur(25px);
  transform:scale(1.15);
  opacity:0.8;
}
.bg-blur::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(
    to top,
    rgba(0,0,0,0.5),
    rgba(0,0,0,0.2),
    transparent
  );
}
/* ảnh chính */
.bg-main{
  position:absolute;
  width:100%;
  height:100%;
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  z-index:2;
}
/* OVERLAY */
.overlay{
  position:absolute;
  bottom:60px;
  left:60px;
  color:white;
  z-index:2;
}

/* DARK */
.login-right::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
}

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(6px);
  z-index:999;
}

.popup-box{
  background:rgba(255,255,255,0.9);
  padding:20px 30px;
  border-radius:16px;
  font-weight:600;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

@keyframes pop{
  from{transform:scale(0.8);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* RESPONSIVE */
@media(max-width:900px){
  .login-right{display:none;}
  .login-left{width:100%;}
}
.welcome-text{
  font-size:26px;
  font-weight:700;
  margin-bottom:20px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.overlay h1, .overlay p{
  transition: all 0.4s ease;
}
</style>
</head>

<body>

<div class="login-left">

  <!-- LOGO -->
  <div class="logo">
    <img src="newlogo.png">
    <span>LearnHub Platform - With Hubie AI</span>
  </div>

  <!-- TAB -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Đăng nhập</div>
    <div class="tab" onclick="switchTab('register')">Đăng ký</div>
  </div>
  <div class="welcome-text">Chào mừng trở lại!</div>

  <!-- LOGIN -->
  <div id="loginForm">

    <button class="login-btn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
      Tiếp tục với Google
    </button>

    <button class="login-btn" onclick="comingSoon()">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" width="20">
      Tiếp tục với GitHub
    </button>

    <button class="login-btn" onclick="comingSoon()">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" width="20">
      Tiếp tục với Microsoft
    </button>

    <div class="login-divider">hoặc</div>

    <div class="input-group">
      <input required>
      <label>Email</label>
    </div>

    <div class="input-group">
      <input type="password" required>
      <label>Mật khẩu</label>
    </div>

    <button class="login-submit" onclick="comingSoon()">Đăng nhập</button>

  </div>

  <!-- REGISTER -->
  <div id="registerForm" style="display:none;">

    <div class="input-group">
      <input required>
      <label>Email</label>
    </div>

    <div class="input-group">
      <input type="password" required>
      <label>Mật khẩu</label>
    </div>

    <div class="input-group">
      <input type="password" required>
      <label>Nhập lại mật khẩu</label>
    </div>

    <button class="login-submit" onclick="comingSoon()">Đăng ký</button>

  </div>

  <div class="login-footer">
    © LearnHub – THPT Tân Hồng
  </div>

</div>

<!-- RIGHT -->
<div class="login-right">

<div class="slide">
  <div class="bg-blur" style="background-image:url('loading1.jpg')"></div>
  <div class="bg-main" style="background-image:url('loading1.jpg')"></div>
</div>

<div class="slide">
  <div class="bg-blur" style="background-image:url('loading2.jpg')"></div>
  <div class="bg-main" style="background-image:url('loading2.jpg')"></div>
</div>

<div class="slide">
  <div class="bg-blur" style="background-image:url('loading3.jpg')"></div>
  <div class="bg-main" style="background-image:url('loading3.jpg')"></div>
</div>

<div class="overlay">
  <h1 id="slideTitle">LearnHub – Nâng cấp cách bạn học</h1>
  <p id="slideDesc">Ôn thi nhanh • Giao diện hiện đại • Tối ưu trải nghiệm</p>
</div>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">🚧 Tính năng đang phát triển</div>
</div>

<script>
/* =========================
   DATA TEXT SLIDE
========================= */
const slideData = [
  {
    title: "LearnHub – Nâng cấp cách bạn học",
    desc: "Ôn thi nhanh • Giao diện hiện đại • Tối ưu trải nghiệm"
  },
  {
    title: "Giao diện chính - Hubie AI",
    desc: "Trợ lý AI thông minh hỗ trợ học tập"
  },
  {
    title: "LearnHub Forum",
    desc: "Trao đổi • Hỏi đáp • Kết nối học sinh"
  }
];


/* =========================
   SLIDESHOW
========================= */
const slides = document.querySelectorAll(".slide");
const title = document.getElementById("slideTitle");
const desc = document.getElementById("slideDesc");

let current = 0;

/* load slide đầu có animation */
setTimeout(() => {
  slides[0].classList.add("active");
  updateText(0);
}, 100);

/* auto chuyển slide */
setInterval(() => {
  slides[current].classList.remove("active");

  current = (current + 1) % slides.length;

  slides[current].classList.add("active");
  updateText(current);

}, 4000);


/* =========================
   UPDATE TEXT
========================= */
function updateText(index){
  title.style.opacity = 0;
  desc.style.opacity = 0;

  setTimeout(() => {
    title.textContent = slideData[index].title;
    desc.textContent = slideData[index].desc;

    title.style.opacity = 1;
    desc.style.opacity = 1;
  }, 200);
}


/* =========================
   POPUP
========================= */
function comingSoon(){
  const popup = document.getElementById("popup");
  const box = popup.querySelector(".popup-box");

  popup.style.display = "flex";
  box.style.animation = "popupShow 0.35s ease";

  setTimeout(()=>{
    box.style.animation = "popupHide 0.35s ease";
    setTimeout(()=>{
      popup.style.display = "none";
    },300);
  },2000);
}


/* =========================
   TAB SWITCH
========================= */
function switchTab(type){
  const login = document.getElementById("loginForm");
  const register = document.getElementById("registerForm");
  const tabs = document.querySelectorAll(".tab");

  tabs.forEach(t => t.classList.remove("active"));

  if(type === "login"){
    login.style.display = "block";
    register.style.display = "none";
    tabs[0].classList.add("active");
  }else{
    login.style.display = "none";
    register.style.display = "block";
    tabs[1].classList.add("active");
  }
}
</script>

</body>
</html>
