<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub ôn tập MOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef6ff;
      --panel: #ffffff;
      --panel-soft: #f8fbff;
      --text: #172033;
      --muted: #5f6f89;
      --line: #d7e2f2;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --accent-soft: #dbeafe;
      --success: #0f766e;
      --success-soft: #ccfbf1;
      --word: #185abd;
      --excel: #107c41;
      --powerpoint: #c43e1c;
      --office: #d83b01;
      --shadow: 0 12px 30px rgba(20, 51, 94, 0.09);
      --shadow-hover: 0 16px 40px rgba(20, 51, 94, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(24, 90, 189, 0.16) 0 16%, transparent 16% 100%),
        linear-gradient(32deg, transparent 0 63%, rgba(16, 124, 65, 0.14) 63% 78%, transparent 78% 100%),
        linear-gradient(158deg, transparent 0 70%, rgba(216, 59, 1, 0.13) 70% 84%, transparent 84% 100%),
        radial-gradient(circle at 12% 6%, rgba(24, 90, 189, 0.2), transparent 24rem),
        radial-gradient(circle at 88% 10%, rgba(16, 124, 65, 0.16), transparent 22rem),
        radial-gradient(circle at 76% 86%, rgba(196, 62, 28, 0.14), transparent 25rem),
        linear-gradient(180deg, #f7fbff 0%, var(--bg) 58%, #f8fbff 100%);
      color: var(--text);
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
    }

    .page {
      width: min(1120px, calc(100% - 36px));
      margin: 0 auto;
      padding: 30px 0 48px;
    }

    .page::before {
      content: "";
      display: block;
      height: 6px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--word), var(--excel), var(--powerpoint), var(--office));
      box-shadow: 0 12px 26px rgba(24, 90, 189, 0.18);
    }

    .hero {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
      margin-bottom: 22px;
      padding: 22px 24px;
      border: 1px solid rgba(215, 226, 242, 0.8);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 12px 38px rgba(20, 51, 94, 0.07);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 7px;
      background: linear-gradient(180deg, var(--word), var(--excel), var(--powerpoint));
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0 0 7px;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      max-width: 660px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .search-box {
      min-width: min(340px, 100%);
      position: relative;
      display: block;
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      width: 19px;
      height: 19px;
      color: var(--muted);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search-box input {
      width: 100%;
      border: 1px solid rgba(215, 226, 242, 0.95);
      border-radius: 14px;
      padding: 14px 16px 14px 48px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.94);
      font-size: 15px;
      outline: none;
      box-shadow: 0 8px 22px rgba(20, 51, 94, 0.07);
    }

    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.13), 0 12px 34px rgba(20, 51, 94, 0.09);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .lesson-count {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      border: 1px solid rgba(215, 226, 242, 0.9);
      border-radius: 12px;
      padding: 8px 13px;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 20px rgba(20, 51, 94, 0.05);
      color: var(--text);
      font-weight: 700;
    }

    .lesson-count::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--success);
      box-shadow: 0 0 0 5px var(--success-soft);
    }

    /* ===== Category (cấp 1) ===== */
    .category-list {
      display: grid;
      gap: 14px;
    }

    .category {
      overflow: hidden;
      border: 1px solid rgba(215, 226, 242, 0.9);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .category:hover {
      border-color: rgba(37, 99, 235, 0.28);
      box-shadow: var(--shadow-hover);
    }

    .category-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 64px;
      gap: 14px;
      border: 0;
      padding: 16px 20px;
      background: linear-gradient(135deg, var(--accent-soft), #fce7e9);
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: filter 0.18s ease;
    }

    .category:nth-child(5n + 1) .category-toggle {
      background: linear-gradient(135deg, #dbeafe, #eaf2ff);
    }

    .category:nth-child(5n + 2) .category-toggle {
      background: linear-gradient(135deg, #dcfce7, #eafdf1);
    }

    .category:nth-child(5n + 3) .category-toggle {
      background: linear-gradient(135deg, #fde2d8, #fdeee8);
    }

    .category:nth-child(5n + 4) .category-toggle {
      background: linear-gradient(135deg, #ffe8d6, #fff1e4);
    }

    .category:nth-child(5n + 5) .category-toggle {
      background: linear-gradient(135deg, #ede9fe, #f4f1ff);
    }

    .category-toggle:hover {
      filter: brightness(0.97);
    }

    .category-heading {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .category-title {
      color: #1c2a44;
      font-family: "Poppins", "Segoe UI", Arial, sans-serif;
      font-size: clamp(17px, 1.9vw, 21px);
      font-weight: 700;
      letter-spacing: 0.1px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .category-meta {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 64px;
      border-radius: 999px;
      padding: 7px 16px;
      background: rgba(255, 255, 255, 0.75);
      color: #1c2a44;
      font-family: "Poppins", "Segoe UI", Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 4px 12px rgba(20, 51, 94, 0.07);
    }

    .category-right {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      gap: 12px;
    }

    .category .chevron {
      background: rgba(255, 255, 255, 0.75);
    }

    .category.open > .category-toggle .chevron {
      transform: rotate(180deg);
    }

    .category-body {
      display: none;
      padding: 16px 16px 18px;
      background: linear-gradient(180deg, #fbfdff 0%, #f6faff 100%);
    }

    .category.open > .category-body {
      display: block;
    }

    .category-empty {
      padding: 10px 6px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .toolbar button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      border: 1px solid rgba(37, 99, 235, 0.22);
      border-radius: 12px;
      padding: 9px 14px;
      background: linear-gradient(180deg, #ffffff 0%, #edf5ff 100%);
      color: var(--accent-dark);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(20, 51, 94, 0.06);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .toolbar button:hover {
      border-color: rgba(37, 99, 235, 0.5);
      color: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 16px 38px rgba(20, 51, 94, 0.12);
    }

    .button-icon {
      width: 17px;
      height: 17px;
    }

    .video-list {
      display: grid;
      gap: 12px;
    }

    .category-body .video-list {
      gap: 10px;
    }

    .lesson {
      overflow: hidden;
      border: 1px solid rgba(215, 226, 242, 0.9);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .lesson:hover {
      border-color: rgba(37, 99, 235, 0.28);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .lesson-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 56px;
      gap: 12px;
      border: 0;
      padding: 11px 14px;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .lesson-toggle:hover {
      background: linear-gradient(90deg, rgba(219, 234, 254, 0.54), rgba(255, 255, 255, 0));
    }

    .lesson-heading {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .lesson-title {
      color: #24324b;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .lesson-badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      border-radius: 999px;
      padding: 3px 9px;
      background: linear-gradient(135deg, var(--accent), #14b8a6);
      color: #ffffff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.2);
    }

    .lesson:nth-child(3n + 1) .lesson-badge {
      background: linear-gradient(135deg, var(--word), #3b82f6);
    }

    .lesson:nth-child(3n + 2) .lesson-badge {
      background: linear-gradient(135deg, var(--excel), #22c55e);
    }

    .lesson:nth-child(3n) .lesson-badge {
      background: linear-gradient(135deg, var(--powerpoint), var(--office));
    }

    .chevron {
      display: grid;
      place-items: center;
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(37, 99, 235, 0.18);
      background: var(--accent-soft);
      color: var(--accent-dark);
      transition: transform 0.2s ease;
      font-size: 18px;
      font-weight: 900;
    }

    .lesson .chevron {
      flex: 0 0 28px;
      width: 28px;
      height: 28px;
      font-size: 15px;
    }

    .lesson.open .chevron {
      transform: rotate(180deg);
    }

    .lesson-body {
      display: none;
      border-top: 1px solid rgba(215, 226, 242, 0.8);
      padding: 12px 14px 14px;
      background: linear-gradient(180deg, #fbfdff 0%, #f6faff 100%);
    }

    .lesson.open .lesson-body {
      display: block;
    }

    .video-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 14px;
      background: #111827;
      box-shadow: 0 12px 28px rgba(17, 24, 39, 0.14);
    }

    .video-frame iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .empty {
      display: none;
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.7);
      color: var(--muted);
      text-align: center;
    }

    .empty.show {
      display: block;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 22px, 1120px);
        padding-top: 18px;
      }

      .hero {
        align-items: stretch;
        flex-direction: column;
        padding: 18px 18px 18px 22px;
        border-radius: 18px;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar button {
        width: 100%;
      }

      .lesson-toggle {
        min-height: 54px;
        padding: 10px 12px;
      }

      .lesson-body {
        padding: 11px 12px;
      }

      .category-toggle {
        min-height: 60px;
        padding: 14px 16px;
      }

      .category-meta {
        min-width: 52px;
        padding: 6px 11px;
        font-size: 13px;
      }

      .category-right {
        gap: 8px;
      }

      .category-body {
        padding: 12px 10px 14px;
      }

    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <div>
        <h1>MOS Learning Hub</h1>
        <p class="subtitle">Không gian tổng hợp video ôn tập MOS, giúp bạn theo dõi bài học và luyện kỹ năng Microsoft Office một cách tập trung.</p>
      </div>

      <label class="search-box" for="searchInput">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10.8 18.1a7.3 7.3 0 1 1 0-14.6 7.3 7.3 0 0 1 0 14.6Zm0-2a5.3 5.3 0 1 0 0-10.6 5.3 5.3 0 0 0 0 10.6Zm5.9.2 4 4a1 1 0 0 1-1.4 1.4l-4-4a1 1 0 0 1 1.4-1.4Z" fill="currentColor"/>
        </svg>
        <input id="searchInput" type="search" placeholder="Tìm bài ôn tập..." autocomplete="off" />
      </label>
    </header>

    <div class="toolbar">
      <span id="lessonCount" class="lesson-count">0 video</span>
      <button id="closeAllBtn" type="button">
        <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7.3 14.7a1 1 0 0 1 0-1.4l4-4a1 1 0 0 1 1.4 0l4 4a1 1 0 1 1-1.4 1.4L12 11.42 8.7 14.7a1 1 0 0 1-1.4 0Z" fill="currentColor"/>
        </svg>
        Thu gọn tất cả
      </button>
    </div>

    <section id="categoryList" class="category-list" aria-label="Danh sách mục ôn tập MOS"></section>
    <p id="emptyState" class="empty">Không tìm thấy video phù hợp.</p>
  </main>

  <script>
    // ====== DỮ LIỆU: 5 MỤC LỚN, MỖI MỤC CHỨA NHIỀU BÀI ======
    // Cách thêm bài mới: vào đúng mục (category) bên dưới, copy 1 dòng { lesson: ..., title: ..., url: ... }
    // rồi dán link Facebook + tên bài vào. Không cần sửa gì khác.
    const categories = [
      {
        name: "MOS Word",
        lessons: [
          {
            lesson: "Bài 1",
            title: "Ví dụ video ôn tập MOS",
            url: "https://www.facebook.com/anhthetime/videos/1547575493678920/?idorvanity=1120718009886483"
          },
          {
            lesson: "Bài 2",
            title: "MOS WORD",
            url: "https://www.facebook.com/anhthetime/videos/1749227052951529/?idorvanity=1120718009886483"
          },
          // Dạng video Facebook:
          // {
          //   lesson: "Bài 3",
          //   title: "Tên video của bạn",
          //   url: "DAN_LINK_FACEBOOK_VAO_DAY"
          // },
        ]
      },
      {
        name: "MOS Excel",
        lessons: [
          // {
          //   lesson: "Bài 1",
          //   title: "Tên video của bạn",
          //   url: "DAN_LINK_FACEBOOK_VAO_DAY"
          // },
        ]
      },
      {
        name: "MOS PowerPoint",
        lessons: [
          // {
          //   lesson: "Bài 1",
          //   title: "Tên video của bạn",
          //   url: "DAN_LINK_FACEBOOK_VAO_DAY"
          // },
        ]
      },
      {
        name: "IC3 - ICDL",
        lessons: [
          // {
          //   lesson: "Bài 1",
          //   title: "Tên video của bạn",
          //   url: "DAN_LINK_FACEBOOK_VAO_DAY"
          // },
        ]
      },
      {
        name: "Các môn đại học",
        lessons: [
          // {
          //   lesson: "Bài 1",
          //   title: "Tên video của bạn",
          //   url: "DAN_LINK_FACEBOOK_VAO_DAY"
          // },
        ]
      },
    ];

    const categoryList = document.querySelector("#categoryList");
    const lessonCount = document.querySelector("#lessonCount");
    const searchInput = document.querySelector("#searchInput");
    const closeAllBtn = document.querySelector("#closeAllBtn");
    const emptyState = document.querySelector("#emptyState");

    function getFacebookIframeHtml(url) {
      if (!url) {
        return "";
      }

      const embedUrl = new URL("https://www.facebook.com/plugins/video.php");
      embedUrl.searchParams.set("height", "314");
      embedUrl.searchParams.set("href", url);
      embedUrl.searchParams.set("show_text", "false");
      embedUrl.searchParams.set("width", "560");
      embedUrl.searchParams.set("t", "0");

      return `
        <iframe
          src="${embedUrl.toString()}"
          title="Video ôn tập MOS"
          tabindex="0"
          scrolling="no"
          frameborder="0"
          sandbox="allow-scripts allow-same-origin allow-presentation"
          allowfullscreen="true"
          allow="autoplay; encrypted-media; picture-in-picture; fullscreen">
        </iframe>
      `;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getVideoHtml(video) {
      return `
        <div class="video-frame">
          ${getFacebookIframeHtml(video.url || "")}
        </div>
      `;
    }

    function getLessonHtml(video, catIndex, lessonIndex) {
      const lessonId = `lesson-${catIndex}-${lessonIndex}`;
      return `
        <article class="lesson">
          <button class="lesson-toggle" type="button" aria-expanded="false" aria-controls="${lessonId}">
            <span class="lesson-heading">
              <span class="lesson-badge">${escapeHtml(video.lesson || `Bài ${lessonIndex + 1}`)}</span>
              <span class="lesson-title">${escapeHtml(video.title || "Bài học chưa có tiêu đề")}</span>
            </span>
            <span class="chevron" aria-hidden="true">⌄</span>
          </button>
          <div id="${lessonId}" class="lesson-body">
            ${getVideoHtml(video)}
          </div>
        </article>
      `;
    }

    function renderCategories(filterText = "") {
      const keyword = filterText.trim().toLowerCase();
      const isSearching = keyword.length > 0;
      let totalMatches = 0;

      const html = categories.map((category, catIndex) => {
        const filteredLessons = category.lessons.filter((video) => {
          const searchableText = `${category.name || ""} ${video.lesson || ""} ${video.title || ""}`.toLowerCase();
          return searchableText.includes(keyword);
        });

        // Khi không tìm kiếm, hiện toàn bộ bài của mục (kể cả mục rỗng)
        const lessonsToShow = isSearching ? filteredLessons : category.lessons;
        totalMatches += lessonsToShow.length;

        // Khi đang tìm kiếm: ẩn hẳn mục không có kết quả khớp
        if (isSearching && filteredLessons.length === 0) {
          return "";
        }

        // Mục tự mở khi đang tìm kiếm và có kết quả khớp
        const openClass = isSearching && filteredLessons.length > 0 ? " open" : "";
        const bodyContent = lessonsToShow.length
          ? lessonsToShow.map((video, lessonIndex) => getLessonHtml(video, catIndex, lessonIndex)).join("")
          : `<p class="category-empty">Chưa có bài nào trong mục này.</p>`;

        return `
          <article class="category${openClass}" data-cat-index="${catIndex}">
            <button class="category-toggle" type="button" aria-expanded="${isSearching && filteredLessons.length > 0 ? "true" : "false"}" aria-controls="category-${catIndex}">
              <span class="category-heading">
                <span class="category-title">${escapeHtml(category.name || `Mục ${catIndex + 1}`)}</span>
              </span>
              <span class="category-right">
                <span class="category-meta">${category.lessons.length} bài</span>
                <span class="chevron" aria-hidden="true">⌄</span>
              </span>
            </button>
            <div id="category-${catIndex}" class="category-body">
              <div class="video-list">
                ${bodyContent}
              </div>
            </div>
          </article>
        `;
      }).join("");

      categoryList.innerHTML = html;
      lessonCount.textContent = `${totalMatches} video`;
      emptyState.classList.toggle("show", isSearching && totalMatches === 0);
    }

    categoryList.addEventListener("click", (event) => {
      // Bấm vào mục lớn (category) — chỉ mở 1 mục tại 1 thời điểm
      const categoryToggle = event.target.closest(".category-toggle");
      if (categoryToggle) {
        const category = categoryToggle.closest(".category");
        const willOpen = !category.classList.contains("open");

        document.querySelectorAll(".category.open").forEach((openCategory) => {
          if (openCategory !== category) {
            openCategory.classList.remove("open");
            openCategory.querySelector(".category-toggle").setAttribute("aria-expanded", "false");
            // Đóng luôn các bài đang mở trong mục bị thu gọn
            openCategory.querySelectorAll(".lesson.open").forEach((lesson) => {
              lesson.classList.remove("open");
              lesson.querySelector(".lesson-toggle").setAttribute("aria-expanded", "false");
            });
          }
        });

        category.classList.toggle("open", willOpen);
        categoryToggle.setAttribute("aria-expanded", String(willOpen));
        return;
      }

      // Bấm vào 1 bài (lesson) bên trong mục — chỉ mở 1 bài tại 1 thời điểm trong cùng mục
      const lessonToggle = event.target.closest(".lesson-toggle");
      if (lessonToggle) {
        const lesson = lessonToggle.closest(".lesson");
        const category = lessonToggle.closest(".category");
        const willOpen = !lesson.classList.contains("open");

        category.querySelectorAll(".lesson.open").forEach((openLesson) => {
          if (openLesson !== lesson) {
            openLesson.classList.remove("open");
            openLesson.querySelector(".lesson-toggle").setAttribute("aria-expanded", "false");
          }
        });

        lesson.classList.toggle("open", willOpen);
        lessonToggle.setAttribute("aria-expanded", String(willOpen));

        if (!willOpen) {
          lessonToggle.focus();
          return;
        }

        const iframe = lesson.querySelector("iframe");
        setTimeout(() => iframe?.focus(), 120);
      }
    });

    closeAllBtn.addEventListener("click", () => {
      document.querySelectorAll(".category.open").forEach((category) => {
        category.classList.remove("open");
        category.querySelector(".category-toggle").setAttribute("aria-expanded", "false");
      });
      document.querySelectorAll(".lesson.open").forEach((lesson) => {
        lesson.classList.remove("open");
        lesson.querySelector(".lesson-toggle").setAttribute("aria-expanded", "false");
      });
    });

    searchInput.addEventListener("input", () => {
      renderCategories(searchInput.value);
    });

    renderCategories();
  </script>
</body>
</html>
