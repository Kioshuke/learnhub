<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub ôn tập MOS</title>
  <style>
    :root {
      --bg: #eef6ff;
      --panel: #ffffff;
      --panel-soft: #f8fbff;
      --text: #172033;
      --muted: #5f6f89;
      --line: #d7e2f2;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --accent-soft: #dbeafe;
      --success: #0f766e;
      --success-soft: #ccfbf1;
      --word: #185abd;
      --excel: #107c41;
      --powerpoint: #c43e1c;
      --office: #d83b01;
      --shadow: 0 12px 30px rgba(20, 51, 94, 0.09);
      --shadow-hover: 0 16px 40px rgba(20, 51, 94, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(24, 90, 189, 0.16) 0 16%, transparent 16% 100%),
        linear-gradient(32deg, transparent 0 63%, rgba(16, 124, 65, 0.14) 63% 78%, transparent 78% 100%),
        linear-gradient(158deg, transparent 0 70%, rgba(216, 59, 1, 0.13) 70% 84%, transparent 84% 100%),
        radial-gradient(circle at 12% 6%, rgba(24, 90, 189, 0.2), transparent 24rem),
        radial-gradient(circle at 88% 10%, rgba(16, 124, 65, 0.16), transparent 22rem),
        radial-gradient(circle at 76% 86%, rgba(196, 62, 28, 0.14), transparent 25rem),
        linear-gradient(180deg, #f7fbff 0%, var(--bg) 58%, #f8fbff 100%);
      color: var(--text);
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
    }

    .page {
      width: min(1120px, calc(100% - 36px));
      margin: 0 auto;
      padding: 30px 0 48px;
    }

    .page::before {
      content: "";
      display: block;
      height: 6px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--word), var(--excel), var(--powerpoint), var(--office));
      box-shadow: 0 12px 26px rgba(24, 90, 189, 0.18);
    }

    .hero {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
      margin-bottom: 22px;
      padding: 22px 24px;
      border: 1px solid rgba(215, 226, 242, 0.8);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 12px 38px rgba(20, 51, 94, 0.07);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 7px;
      background: linear-gradient(180deg, var(--word), var(--excel), var(--powerpoint));
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0 0 7px;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      max-width: 660px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .search-box {
      min-width: min(340px, 100%);
      position: relative;
      display: block;
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      width: 19px;
      height: 19px;
      color: var(--muted);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search-box input {
      width: 100%;
      border: 1px solid rgba(215, 226, 242, 0.95);
      border-radius: 14px;
      padding: 14px 16px 14px 48px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.94);
      font-size: 15px;
      outline: none;
      box-shadow: 0 8px 22px rgba(20, 51, 94, 0.07);
    }

    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.13), 0 12px 34px rgba(20, 51, 94, 0.09);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .lesson-count {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      border: 1px solid rgba(215, 226, 242, 0.9);
      border-radius: 12px;
      padding: 8px 13px;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 20px rgba(20, 51, 94, 0.05);
      color: var(--text);
      font-weight: 700;
    }

    .lesson-count::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--success);
      box-shadow: 0 0 0 5px var(--success-soft);
    }

    .toolbar button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      border: 1px solid rgba(37, 99, 235, 0.22);
      border-radius: 12px;
      padding: 9px 14px;
      background: linear-gradient(180deg, #ffffff 0%, #edf5ff 100%);
      color: var(--accent-dark);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(20, 51, 94, 0.06);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .toolbar button:hover {
      border-color: rgba(37, 99, 235, 0.5);
      color: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 16px 38px rgba(20, 51, 94, 0.12);
    }

    .button-icon {
      width: 17px;
      height: 17px;
    }

    .video-list {
      display: grid;
      gap: 12px;
    }

    .lesson {
      overflow: hidden;
      border: 1px solid rgba(215, 226, 242, 0.9);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .lesson:hover {
      border-color: rgba(37, 99, 235, 0.28);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .lesson-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 74px;
      gap: 14px;
      border: 0;
      padding: 16px 18px;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .lesson-toggle:hover {
      background: linear-gradient(90deg, rgba(219, 234, 254, 0.54), rgba(255, 255, 255, 0));
    }

    .lesson-heading {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .lesson-title {
      color: #24324b;
      font-size: clamp(16px, 1.7vw, 18px);
      font-weight: 700;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .lesson-badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      border-radius: 999px;
      padding: 5px 10px;
      background: linear-gradient(135deg, var(--accent), #14b8a6);
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.22);
    }

    .lesson:nth-child(3n + 1) .lesson-badge {
      background: linear-gradient(135deg, var(--word), #3b82f6);
    }

    .lesson:nth-child(3n + 2) .lesson-badge {
      background: linear-gradient(135deg, var(--excel), #22c55e);
    }

    .lesson:nth-child(3n) .lesson-badge {
      background: linear-gradient(135deg, var(--powerpoint), var(--office));
    }

    .chevron {
      display: grid;
      place-items: center;
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(37, 99, 235, 0.18);
      background: var(--accent-soft);
      color: var(--accent-dark);
      transition: transform 0.2s ease;
      font-size: 18px;
      font-weight: 900;
    }

    .lesson.open .chevron {
      transform: rotate(180deg);
    }

    .lesson-body {
      display: none;
      border-top: 1px solid rgba(215, 226, 242, 0.8);
      padding: 16px 18px 18px;
      background: linear-gradient(180deg, #fbfdff 0%, #f6faff 100%);
    }

    .lesson.open .lesson-body {
      display: block;
    }

    .video-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 14px;
      background: #111827;
      box-shadow: 0 12px 28px rgba(17, 24, 39, 0.14);
    }

    .video-frame iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .empty {
      display: none;
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.7);
      color: var(--muted);
      text-align: center;
    }

    .empty.show {
      display: block;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 22px, 1120px);
        padding-top: 18px;
      }

      .hero {
        align-items: stretch;
        flex-direction: column;
        padding: 18px 18px 18px 22px;
        border-radius: 18px;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar button {
        width: 100%;
      }

      .lesson-toggle {
        min-height: 72px;
        padding: 15px;
      }

      .lesson-body {
        padding: 14px;
      }

    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <div>
        <h1>MOS Learning Hub</h1>
        <p class="subtitle">Không gian tổng hợp video ôn tập MOS, giúp bạn theo dõi bài học và luyện kỹ năng Microsoft Office một cách tập trung.</p>
      </div>

      <label class="search-box" for="searchInput">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10.8 18.1a7.3 7.3 0 1 1 0-14.6 7.3 7.3 0 0 1 0 14.6Zm0-2a5.3 5.3 0 1 0 0-10.6 5.3 5.3 0 0 0 0 10.6Zm5.9.2 4 4a1 1 0 0 1-1.4 1.4l-4-4a1 1 0 0 1 1.4-1.4Z" fill="currentColor"/>
        </svg>
        <input id="searchInput" type="search" placeholder="Tìm bài ôn tập..." autocomplete="off" />
      </label>
    </header>

    <div class="toolbar">
      <span id="lessonCount" class="lesson-count">0 video</span>
      <button id="closeAllBtn" type="button">
        <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7.3 14.7a1 1 0 0 1 0-1.4l4-4a1 1 0 0 1 1.4 0l4 4a1 1 0 1 1-1.4 1.4L12 11.42 8.7 14.7a1 1 0 0 1-1.4 0Z" fill="currentColor"/>
        </svg>
        Thu gọn tất cả
      </button>
    </div>

    <section id="videoList" class="video-list" aria-label="Danh sách video ôn tập MOS"></section>
    <p id="emptyState" class="empty">Không tìm thấy video phù hợp.</p>
  </main>

  <script>
    const videos = [
      {
        lesson: "Bài 1",
        title: "Ví dụ video ôn tập MOS",
        url: "https://www.facebook.com/anhthetime/videos/1547575493678920/?idorvanity=1120718009886483"
      },

      // Dạng video Facebook:
      // {
      //   lesson: "Bài 2",
      //   title: "Tên video của bạn",
      //   url: "DAN_LINK_FACEBOOK_VAO_DAY"
      // },

    ];

    const videoList = document.querySelector("#videoList");
    const lessonCount = document.querySelector("#lessonCount");
    const searchInput = document.querySelector("#searchInput");
    const closeAllBtn = document.querySelector("#closeAllBtn");
    const emptyState = document.querySelector("#emptyState");

    function getFacebookIframeHtml(url) {
      if (!url) {
        return "";
      }

      const embedUrl = new URL("https://www.facebook.com/plugins/video.php");
      embedUrl.searchParams.set("height", "314");
      embedUrl.searchParams.set("href", url);
      embedUrl.searchParams.set("show_text", "false");
      embedUrl.searchParams.set("width", "560");
      embedUrl.searchParams.set("t", "0");

      return `
        <iframe
          src="${embedUrl.toString()}"
          title="Video ôn tập MOS"
          tabindex="0"
          scrolling="no"
          frameborder="0"
          sandbox="allow-scripts allow-same-origin allow-presentation"
          allowfullscreen="true"
          allow="autoplay; encrypted-media; picture-in-picture; fullscreen">
        </iframe>
      `;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getVideoHtml(video) {
      return `
        <div class="video-frame">
          ${getFacebookIframeHtml(video.url || "")}
        </div>
      `;
    }

    function renderVideos(filterText = "") {
      const keyword = filterText.trim().toLowerCase();
      const filteredVideos = videos.filter((video) => {
        const searchableText = `${video.lesson || ""} ${video.title || ""}`.toLowerCase();
        return searchableText.includes(keyword);
      });

      videoList.innerHTML = filteredVideos.map((video, index) => {
        return `
          <article class="lesson">
            <button class="lesson-toggle" type="button" aria-expanded="false" aria-controls="lesson-${index}">
              <span class="lesson-heading">
                <span class="lesson-badge">${escapeHtml(video.lesson || `Bài ${index + 1}`)}</span>
                <span class="lesson-title">${escapeHtml(video.title || "Bài học chưa có tiêu đề")}</span>
              </span>
              <span class="chevron" aria-hidden="true">⌄</span>
            </button>
            <div id="lesson-${index}" class="lesson-body">
              ${getVideoHtml(video)}
            </div>
          </article>
        `;
      }).join("");

      lessonCount.textContent = `${filteredVideos.length} video`;
      emptyState.classList.toggle("show", filteredVideos.length === 0);
    }

    videoList.addEventListener("click", (event) => {
      const toggle = event.target.closest(".lesson-toggle");

      if (!toggle) {
        return;
      }

      const lesson = toggle.closest(".lesson");
      const isOpen = lesson.classList.toggle("open");
      toggle.setAttribute("aria-expanded", String(isOpen));

      if (!isOpen) {
        toggle.focus();
        return;
      }

      const iframe = lesson.querySelector("iframe");
      setTimeout(() => iframe?.focus(), 120);
    });

    closeAllBtn.addEventListener("click", () => {
      document.querySelectorAll(".lesson.open").forEach((lesson) => {
        lesson.classList.remove("open");
        lesson.querySelector(".lesson-toggle").setAttribute("aria-expanded", "false");
      });
    });

    searchInput.addEventListener("input", () => {
      renderVideos(searchInput.value);
    });

    renderVideos();
  </script>
</body>
</html>
