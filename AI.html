<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnHub AI - Hubie</title>
    <style>
        /* Tối ưu hóa tràn viền tuyệt đối để iframe tự quyết định giao diện */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        body, html { 
            width: 100%; 
            height: 100%; 
            background: transparent; 
            overflow: hidden; 
        }
        .chat-container { 
            width: 100%; 
            height: 100%; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
            display: block;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <iframe
        src="https://udify.app/chatbot/RfG89i4QKoVU8G42"
        allow="microphone">
    </iframe>
</div>

</body>
</html>
