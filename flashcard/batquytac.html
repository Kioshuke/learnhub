<!doctype html>
<html lang="vi">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Irregular Verbs Practice</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f4f6f9; font-size: 1rem; }
    h1, h2, h3, .font-heading { font-family: 'Lexend', sans-serif; }
    
    /* Custom Scrollbar cho bảng mobile */
    .custom-scroll::-webkit-scrollbar { height: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    /* Menu chính và phụ gộp */
    .nav-btn { transition: all 0.2s; border-radius: 8px; padding: 8px 12px; font-size: 0.95rem; font-weight: 500; color: #475569; }
    .nav-btn.active { background: #667eea; color: white; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25); }
    
    .sub-nav-btn { transition: all 0.2s; border-radius: 6px; padding: 6px 10px; font-size: 0.85rem; font-weight: 500; border: 1px solid #e2e8f0; color: #64748b; background: white; }
    .sub-nav-btn.active { border-color: #667eea; color: #667eea; background: rgba(102, 126, 234, 0.08); }

    /* Match mode - Cơ chế Click-to-select tối ưu mobile */
    .click-chip {
      transition: all 0.2s ease;
      font-size: 0.95rem;
      cursor: pointer;
      user-select: none;
    }
    .click-chip.selected {
      background: #667eea !important;
      color: white !important;
      border-color: #5a67d8 !important;
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(102, 126, 234, 0.2);
    }
    .dropzone { transition: all 0.15s ease; font-size: 0.95rem; min-height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; text-align: center; }
    .dropzone.flash-wrong {
      border-color: #f87171 !important;
      background: #fef2f2 !important;
      color: #ef4444 !important;
      animation: shake 0.3s ease-in-out;
    }
    .dropzone.filled {
      border-style: solid !important;
      border-color: #22c55e !important;
      background: #f0fdf4 !important;
      color: #16a34a !important;
      font-weight: 600;
      cursor: default;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
  </style>
 </head>
 <body data-template-id="__page-root" class="min-h-screen p-3 sm:p-6">
  <main class="max-w-4xl mx-auto space-y-4">
   
   <div class="bg-white rounded-xl p-2 shadow-sm border border-gray-200/80">
     <nav class="grid grid-cols-3 gap-1 text-center">
      <button class="nav-btn active" data-tab="learn">📚 <span class="hidden sm:inline">Học tập</span><span class="inline sm:hidden">Học</span></button> 
      <button class="nav-btn" data-tab="review">🔄 <span class="hidden sm:inline">Ôn tập</span><span class="inline sm:hidden">Ôn</span></button> 
      <button class="nav-btn" data-tab="practice">✏️ <span class="hidden sm:inline">Luyện tập</span><span class="inline sm:hidden">Luyện</span></button> 
     </nav>
     
     <div id="sub-navigation" class="hidden flex gap-2 justify-center mt-2 pt-2 border-t border-gray-100"></div>
   </div>

   <section id="tab-learn" class="space-y-3">
    <div class="overflow-x-auto rounded-xl border border-gray-200 shadow-sm bg-white custom-scroll">
     <table class="w-full text-sm min-w-[400px]">
      <thead>
       <tr class="bg-gradient-to-r from-purple-500 to-indigo-500 text-white text-xs uppercase tracking-wider">
        <th class="px-3 py-3 text-left font-semibold font-heading">V1</th>
        <th class="px-3 py-3 text-left font-semibold font-heading">V2</th>
        <th class="px-3 py-3 text-left font-semibold font-heading">V3</th>
        <th class="px-3 py-3 text-left font-semibold font-heading">Nghĩa</th>
       </tr>
      </thead>
      <tbody id="verb-table" class="divide-y divide-gray-100 text-gray-700"></tbody>
     </table>
    </div>
   </section>

   <section id="tab-review" class="hidden space-y-4">
    <div id="review-flashcard" class="flex flex-col items-center gap-4 hidden">
     <div id="flashcard" class="w-full max-w-sm bg-white border-2 border-purple-200 rounded-2xl p-6 text-center shadow-md cursor-pointer min-h-[180px] flex flex-col justify-center items-center transition-all bg-gradient-to-b from-purple-50/40 to-white">
      <p class="text-xs uppercase tracking-wider text-purple-600 mb-1 font-bold" id="flashcard-prompt"></p>
      <p class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-transparent font-heading" id="flashcard-word"></p>
      <div id="flashcard-details" class="hidden mt-4 pt-4 border-t border-purple-100 w-full">
       <div class="grid grid-cols-3 gap-2 text-xs">
        <div><p class="text-gray-400 font-medium">V1</p><p class="font-bold text-sm text-indigo-600" id="fc-v1"></p></div>
        <div><p class="text-gray-400 font-medium">V2</p><p class="font-bold text-sm text-indigo-600" id="fc-v2"></p></div>
        <div><p class="text-gray-400 font-medium">V3</p><p class="font-bold text-sm text-indigo-600" id="fc-v3"></p></div>
       </div>
       <p class="mt-3 text-base font-semibold text-emerald-600 font-heading" id="fc-meaning"></p>
      </div>
     </div>
     <button id="btn-next-flashcard" class="w-full max-w-sm py-3 bg-gradient-to-r from-purple-500 to-indigo-500 text-white rounded-xl text-sm font-medium shadow-sm active:scale-95 transition-transform">Từ tiếp theo ➡️</button>
     <p id="flashcard-score" class="text-xs text-gray-500 font-medium"></p>
    </div>

    <div id="review-multiple" class="hidden flex flex-col items-center gap-4">
     <div class="w-full max-w-sm bg-white border border-gray-200 rounded-xl p-5 text-center shadow-sm">
      <p class="text-xs uppercase tracking-wider text-indigo-500 mb-1 font-bold" id="mc-prompt"></p>
      <p class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent font-heading" id="mc-word"></p>
     </div>
     <div id="mc-options" class="w-full max-w-sm grid grid-cols-1 gap-2.5"></div>
     <p id="mc-score" class="text-xs text-gray-500 font-medium"></p>
    </div>
   </section>

   <section id="tab-practice" class="hidden space-y-4">
    <div id="practice-fill" class="space-y-3 hidden">
     <div class="overflow-x-auto rounded-xl border border-gray-200 shadow-sm bg-white custom-scroll">
      <table class="w-full text-sm min-w-[460px]">
       <thead>
        <tr class="bg-gradient-to-r from-amber-500 to-orange-500 text-white text-xs">
         <th class="px-3 py-2.5 text-left font-semibold">V1</th>
         <th class="px-3 py-2.5 text-left font-semibold">V2</th>
         <th class="px-3 py-2.5 text-left font-semibold">V3</th>
         <th class="px-3 py-2.5 text-left font-semibold">Nghĩa</th>
        </tr>
       </thead>
       <tbody id="practice-table-body" class="divide-y divide-gray-100"></tbody>
      </table>
     </div>
     <div class="grid grid-cols-2 gap-2">
      <button id="btn-check-practice" class="py-2.5 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-lg text-sm font-medium shadow-sm active:scale-95 transition-transform">✅ Kiểm tra</button> 
      <button id="btn-new-practice" class="py-2.5 bg-white border border-gray-300 text-gray-700 rounded-lg text-sm font-medium">🔄 Đề mới</button>
     </div>
     <p id="practice-score" class="text-center font-semibold text-sm text-gray-800 hidden"></p>
    </div>

    <div id="practice-match" class="hidden space-y-3">
     <p class="text-xs text-gray-500 text-center">💡 Chọn từ ở dưới rồi chạm vào ô trống tương ứng ở trên.</p>
     <div id="match-rows" class="space-y-2"></div>
     
     <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-200/80">
      <div id="match-pool" class="flex flex-wrap gap-2 min-h-[45px] p-1 bg-gray-50 rounded-lg border border-dashed border-gray-200"></div>
     </div>

     <div class="grid grid-cols-2 gap-2">
      <button id="btn-reset-match" class="py-2 bg-white border border-gray-300 text-gray-700 rounded-lg text-sm font-medium">🔄 Làm lại</button>
      <button id="btn-new-match" class="py-2 bg-gradient-to-r from-emerald-500 to-teal-500 text-white rounded-lg text-sm font-medium shadow-sm active:scale-95 transition-transform">🆕 Bộ mới (4 từ)</button>
     </div>
     <p id="match-score" class="font-bold text-sm text-emerald-600 hidden text-center font-heading"></p>
    </div>
   </section>
  </main>

  <script>
    // --- KHAI BÁO ÂM THANH ĐÚNG/SAI CHÍNH ---
    const soundCorrect = new Audio("https://www.myinstants.com/media/sounds/correct-answer-sound-effect-19.mp3");
    const soundWrong = new Audio("https://www.myinstants.com/media/sounds/2-incorrect-answer.mp3");
    const soundHappy = new Audio("https://www.myinstants.com/media/sounds/correcto_Xgyp04B.mp3");

    // Thay thế âm thanh click nhẹ bằng link theo yêu cầu của bạn
    const soundclick = new Audio("https://www.myinstants.com/media/sounds/clicksoundeffect.mp3");

    // Nhạc nền các chế độ
    const soundGame1 = new Audio("bgm_flashcard.mp3"); 
    const soundGame4 = new Audio("bgm_defender.mp3");  
    const soundGame3 = new Audio("bgm_blast.mp3");     
    const soundGame2 = new Audio("bgm_match.mp3");     

    // Cấu hình lặp nhạc nền
    [soundGame1, soundGame2, soundGame3, soundGame4].forEach(bgm => {
      bgm.loop = true;
      bgm.volume = 0.4; 
    });

    function stopAllBGM() {
      soundGame1.pause(); soundGame1.currentTime = 0;
      soundGame2.pause(); soundGame2.currentTime = 0;
      soundGame3.pause(); soundGame3.currentTime = 0;
      soundGame4.pause(); soundGame4.currentTime = 0;
    }

    function playBGM(audioObj) {
      stopAllBGM();
      audioObj.play().catch(e => console.log("BGM cần tương tác để chạy."));
    }

    let verbs = [];
    let selectedChipData = null; 
    let currentSubMode = { review: 'flashcard', practice: 'fill' };
    
    async function loadVerbData() {
      try {
        const response = await fetch('tuvung.csv');
        if (!response.ok) throw new Error();
        const text = await response.text();
        verbs = text.trim().split('\n').map(line => {
          const parts = line.split(',').map(s => s.trim());
          if (parts.length >= 4 && parts[0]) {
            return { v1: parts[0], v2: parts[1], v3: parts[2], meaning: parts[3] };
          }
        }).filter(v => v);
        renderTable();
      } catch (error) {
        verbs = [
          { v1: 'prove', v2: 'proved', v3: 'proven/proved', meaning: 'chứng minh' },
          { v1: 'hit', v2: 'hit', v3: 'hit', meaning: 'đụng, đập' },
          { v1: 'remake', v2: 'remade', v3: 'remade', meaning: 'làm lại' },
          { v1: 'unbend', v2: 'unbent', v3: 'unbent', meaning: 'làm thẳng lại' },
          { v1: 'overeat', v2: 'overate', v3: 'overeaten', meaning: 'ăn quá nhiều' }
        ];
        renderTable();
      }
    }
    loadVerbData();

    // Xử lý đổi Tab chính
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const currentTab = btn.dataset.tab;
        ['learn','review','practice'].forEach(t => {
          document.getElementById('tab-' + t).classList.toggle('hidden', currentTab !== t);
        });

        const subNav = document.getElementById('sub-navigation');
        if (currentTab === 'review') {
          subNav.classList.remove('hidden');
          renderSubMenu([
            { id: 'flashcard', label: '🃏 Thẻ ghi nhớ' },
            { id: 'multiple', label: '❓ Trắc nghiệm' }
          ], currentSubMode.review, (id) => {
            currentSubMode.review = id;
            switchReviewSubMode(id);
          });
          switchReviewSubMode(currentSubMode.review);
        } else if (currentTab === 'practice') {
          subNav.classList.remove('hidden');
          renderSubMenu([
            { id: 'fill', label: '✏️ Điền vào bảng' },
            { id: 'match', label: '🔗 Ghép nối từ' }
          ], currentSubMode.practice, (id) => {
            currentSubMode.practice = id;
            switchPracticeSubMode(id);
          });
          switchPracticeSubMode(currentSubMode.practice);
        } else {
          subNav.classList.add('hidden');
          stopAllBGM();
        }
      });
    });

    function renderSubMenu(modes, activeId, callback) {
      const subNav = document.getElementById('sub-navigation');
      subNav.innerHTML = modes.map(m => `
        <button class="sub-nav-btn ${m.id === activeId ? 'active' : ''}" data-subid="${m.id}">${m.label}</button>
      `).join('');
      subNav.querySelectorAll('.sub-nav-btn').forEach(b => {
        b.addEventListener('click', () => {
          subNav.querySelectorAll('.sub-nav-btn').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          callback(b.dataset.subid);
        });
      });
    }

    function switchReviewSubMode(id) {
      document.getElementById('review-flashcard').classList.toggle('hidden', id !== 'flashcard');
      document.getElementById('review-multiple').classList.toggle('hidden', id !== 'multiple');
      if (id === 'flashcard') { playBGM(soundGame1); nextFlashcard(); }
      if (id === 'multiple') { playBGM(soundGame4); mcCount = 0; nextMultiple(); }
    }

    function switchPracticeSubMode(id) {
      document.getElementById('practice-fill').classList.toggle('hidden', id !== 'fill');
      document.getElementById('practice-match').classList.toggle('hidden', id !== 'match');
      if (id === 'fill') { playBGM(soundGame3); generatePractice(); }
      if (id === 'match') { playBGM(soundGame2); generateMatch(); }
    }

    function renderTable() {
      const tb = document.getElementById('verb-table');
      if(!tb) return;
      tb.innerHTML = verbs.map(v => `<tr class="border-b border-gray-100 hover:bg-gray-50/50"><td class="px-3 py-2.5 font-semibold text-gray-900">${v.v1}</td><td class="px-3 py-2.5 text-xs sm:text-sm">${v.v2}</td><td class="px-3 py-2.5 text-xs sm:text-sm">${v.v3}</td><td class="px-3 py-2.5 text-xs sm:text-sm text-gray-500">${v.meaning}</td></tr>`).join('');
    }

    // --- ÔN TẬP FLASHCARD ---
    let flashcardCount = 0;
    function nextFlashcard() {
      if(!verbs.length) return;
      const v = verbs[Math.floor(Math.random() * verbs.length)];
      const forms = ['v1','v2','v3','meaning'];
      const labels = { v1: 'V1 (Base)', v2: 'V2 (Past)', v3: 'V3 (P.P.)', meaning: 'Nghĩa' };
      const showIdx = Math.floor(Math.random() * 4);
      
      document.getElementById('flashcard-prompt').textContent = labels[forms[showIdx]];
      document.getElementById('flashcard-word').textContent = v[forms[showIdx]];
      document.getElementById('flashcard-details').classList.add('hidden');
      document.getElementById('fc-v1').textContent = v.v1;
      document.getElementById('fc-v2').textContent = v.v2;
      document.getElementById('fc-v3').textContent = v.v3;
      document.getElementById('fc-meaning').textContent = v.meaning;
      
      document.getElementById('flashcard').onclick = () => {
        document.getElementById('flashcard-details').classList.toggle('hidden');
      };
      document.getElementById('btn-next-flashcard').onclick = () => {
        nextFlashcard();
      };
      document.getElementById('flashcard-score').textContent = `Đã lật xem: ${++flashcardCount} lần`;
    }

    // --- TRẮC NGHIỆM ĐA SẮC MÀU ---
    let mcCount = 0;
    function nextMultiple() {
      if (!verbs.length) return;
      const v = verbs[Math.floor(Math.random() * verbs.length)];
      const forms = ['v1','v2','v3'];
      const labels = { v1: 'V1 (Base)', v2: 'V2 (Past)', v3: 'V3 (P.P.)' };
      const showIdx = Math.floor(Math.random() * 3);
      const askIdx = showIdx === 0 ? (Math.random() < 0.5 ? 1 : 2) : (showIdx === 1 ? (Math.random() < 0.5 ? 0 : 2) : (Math.random() < 0.5 ? 0 : 1));
      
      const showForm = forms[showIdx];
      const askForm = forms[askIdx];
      
      document.getElementById('mc-prompt').textContent = `Tìm ${labels[askForm]} của từ:`;
      document.getElementById('mc-word').textContent = v[showForm];
      
      let wrongAnswers = [];
      const otherVerbs = verbs.filter(verb => verb.v1 !== v.v1);
      while (wrongAnswers.length < 3 && otherVerbs.length > 0) {
        const randomVerb = otherVerbs[Math.floor(Math.random() * otherVerbs.length)];
        const wrongValue = randomVerb[askForm];
        if (wrongValue !== v[askForm] && !wrongAnswers.includes(wrongValue)) wrongAnswers.push(wrongValue);
      }
      
      const correctAnswer = v[askForm];
      const options = [correctAnswer, ...wrongAnswers].sort(() => Math.random() - 0.5);
      
      const colorStyles = [
        "bg-blue-50 border-blue-200 hover:bg-blue-100 text-blue-800",
        "bg-purple-50 border-purple-200 hover:bg-purple-100 text-purple-800",
        "bg-orange-50 border-orange-200 hover:bg-orange-100 text-orange-800",
        "bg-pink-50 border-pink-200 hover:bg-pink-100 text-pink-800"
      ];

      const optionsDiv = document.getElementById('mc-options');
      optionsDiv.innerHTML = options.map((opt, index) => `
        <button type="button" class="mc-option w-full border-2 rounded-xl p-3 text-left font-semibold text-sm transition-all shadow-sm ${colorStyles[index]}" data-correct="${opt === correctAnswer}">${opt}</button>
      `).join('');
      
      document.querySelectorAll('.mc-option').forEach(btn => {
        btn.addEventListener('click', () => {
          const isCorrect = btn.dataset.correct === 'true';
          if (isCorrect) { 
            soundCorrect.currentTime = 0;
            soundCorrect.play().catch(e => {});
            mcCount++; 
            btn.className = "mc-option w-full border-2 border-green-500 bg-green-100 text-green-800 rounded-xl p-3 text-left font-bold shadow-sm scale-[1.01]";
          } else {
            soundWrong.currentTime = 0;
            soundWrong.play().catch(e => {});
            btn.className = "mc-option w-full border-2 border-red-500 bg-red-100 text-red-800 rounded-xl p-3 text-left font-bold shadow-sm";
            document.querySelectorAll('.mc-option').forEach(b => {
              if (b.dataset.correct === 'true') {
                b.className = "mc-option w-full border-2 border-green-500 bg-green-100 text-green-800 rounded-xl p-3 text-left font-bold shadow-sm";
              }
            });
          }
          document.querySelectorAll('.mc-option').forEach(b => b.disabled = true);
          setTimeout(nextMultiple, 1500);
        });
      });
      document.getElementById('mc-score').textContent = `Đúng: ${mcCount} câu`;
    }

    // --- ĐIỀN TỪ VÀO BẢNG ---
    function generatePractice() {
      const body = document.getElementById('practice-table-body');
      document.getElementById('practice-score').classList.add('hidden');
      if (!verbs.length) return;

      const selectedVerbs = [...verbs].sort(() => Math.random() - 0.5).slice(0, 5); 
      const cols = ['v1', 'v2', 'v3', 'meaning'];
      
      body.innerHTML = selectedVerbs.map((v) => {
        const numBlanks = Math.floor(Math.random() * 2) + 1; 
        const blanks = new Set();
        while(blanks.size < numBlanks) {
          blanks.add(Math.floor(Math.random() * 4));
        }

        return `<tr class="border-b border-gray-100 text-sm">${cols.map((c, ci) => {
          if (blanks.has(ci)) {
            return `<td class="p-2"><input type="text" class="practice-input w-full bg-amber-50 border border-amber-200 rounded-md px-1.5 py-1 text-xs text-amber-900 font-bold focus:outline-none focus:border-amber-400" data-answer="${v[c]}" placeholder="?"></td>`;
          }
          return `<td class="p-2 text-gray-700 font-medium">${v[c]}</td>`;
        }).join('')}</tr>`;
      }).join('');
    }

    document.getElementById('btn-check-practice').addEventListener('click', () => {
      let correct = 0, total = 0;
      document.querySelectorAll('.practice-input').forEach(input => {
        total++;
        if (input.value.trim().toLowerCase() === input.dataset.answer.toLowerCase()) {
          input.className = "practice-input w-full border border-green-500 bg-green-50 text-xs px-1.5 py-1 text-green-700 font-bold rounded-md";
          correct++;
        } else {
          input.className = "practice-input w-full border border-red-500 bg-red-50 text-xs px-1.5 py-1 text-red-700 font-bold rounded-md";
        }
      });
      
      if (correct === total) { soundHappy.currentTime = 0; soundHappy.play().catch(e=>{}); } else { soundWrong.currentTime = 0; soundWrong.play().catch(e=>{}); }
      
      const scoreEl = document.getElementById('practice-score');
      scoreEl.textContent = `Kết quả: ${correct}/${total} ô chính xác`;
      scoreEl.classList.remove('hidden');
    });
    document.getElementById('btn-new-practice').addEventListener('click', () => {
      generatePractice();
    });

    // --- GHÉP NỐI TỪ (ĐÃ CẬP NHẬT SOUNDCLICK MỚI) ---
    let currentMatchVerbs = [];
    let matchCorrectCount = 0;
    let matchTotalCount = 0;

    function generateMatch(pickNewVerbs = true) {
      document.getElementById('match-score').classList.add('hidden');
      selectedChipData = null;

      if (!verbs.length) return;
      if (pickNewVerbs || currentMatchVerbs.length === 0) {
        currentMatchVerbs = [...verbs].sort(() => Math.random() - 0.5).slice(0, 4);
      }

      matchCorrectCount = 0;
      matchTotalCount = currentMatchVerbs.length * 2;

      const rowsEl = document.getElementById('match-rows');
      rowsEl.innerHTML = currentMatchVerbs.map(v => `
        <div class="match-row bg-white rounded-xl p-2.5 shadow-sm border border-gray-100 grid grid-cols-3 gap-1.5 items-center transition-all" id="row-${v.v1}">
          <div class="px-1 min-w-0">
            <div class="font-bold text-sm text-emerald-600 truncate">${v.v1}</div>
            <div class="text-[11px] text-gray-400 font-medium truncate mt-0.5">(${v.meaning})</div>
          </div>
          <div class="dropzone border border-dashed border-gray-300 rounded-lg text-xs text-gray-400 bg-gray-50/50" data-type="v2" data-verb-key="${v.v1}">Chọn V2</div>
          <div class="dropzone border border-dashed border-gray-300 rounded-lg text-xs text-gray-400 bg-gray-50/50" data-type="v3" data-verb-key="${v.v1}">Chọn V3</div>
        </div>
      `).join('');

      let pool = [];
      currentMatchVerbs.forEach(v => {
        pool.push({ value: v.v2, type: 'v2', verbKey: v.v1 });
        pool.push({ value: v.v3, type: 'v3', verbKey: v.v1 });
      });
      pool.sort(() => Math.random() - 0.5);

      const poolEl = document.getElementById('match-pool');
      poolEl.innerHTML = pool.map((item, idx) => `
        <div class="click-chip px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-xs font-semibold shadow-sm text-gray-800"
             data-value="${item.value}" data-type="${item.type}" data-verb-key="${item.verbKey}" id="chip-${idx}">
          ${item.value}
        </div>
      `).join('');

      // Khi bấm vào ô chữ ở dưới -> Phát âm thanh click mới từ link của bạn
      document.querySelectorAll('.click-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          soundclick.currentTime = 0;
          soundclick.play().catch(e => {}); 
          
          document.querySelectorAll('.click-chip').forEach(c => c.classList.remove('selected'));
          chip.classList.add('selected');
          selectedChipData = { id: chip.id, value: chip.dataset.value, type: chip.dataset.type, verbKey: chip.dataset.verbKey };
        });
      });

      // Khi bấm vào ô trống dropzone
      document.querySelectorAll('.dropzone').forEach(dropzone => {
        dropzone.addEventListener('click', () => {
          if (dropzone.classList.contains('filled')) return;
          if (!selectedChipData) { return; }

          const isCorrect = dropzone.dataset.type === selectedChipData.type && dropzone.dataset.verbKey === selectedChipData.verbKey;
          if (isCorrect) {
            // Đúng -> Báo hiệu âm thanh chính xác
            soundCorrect.currentTime = 0;
            soundCorrect.play().catch(e => {});

            dropzone.textContent = selectedChipData.value;
            dropzone.classList.add('filled');
            const selectedChip = document.getElementById(selectedChipData.id);
            if (selectedChip) selectedChip.remove();
            
            const rowEl = document.getElementById(`row-${selectedChipData.verbKey}`);
            if (rowEl) {
              const unfilledZones = rowEl.querySelectorAll('.dropzone:not(.filled)');
              if (unfilledZones.length === 0) {
                rowEl.classList.remove('bg-white', 'border-gray-100');
                rowEl.classList.add('bg-green-50', 'border-green-200');
              }
            }

            selectedChipData = null;
            matchCorrectCount++;
            updateMatchScore();
          } else {
            // Sai -> Báo hiệu âm thanh sai
            soundWrong.currentTime = 0;
            soundWrong.play().catch(e => {});

            dropzone.classList.add('flash-wrong');
            setTimeout(() => dropzone.classList.remove('flash-wrong'), 400);
          }
        });
      });
    }

    function updateMatchScore() {
      const scoreEl = document.getElementById('match-score');
      scoreEl.classList.remove('hidden');
      if (matchCorrectCount >= matchTotalCount) {
        soundHappy.currentTime = 0;
        soundHappy.play().catch(e => {});
        scoreEl.innerHTML = `🎉 Xuất sắc! Hoàn thành bộ từ này!`;
      } else {
        scoreEl.textContent = `Chính xác: ${matchCorrectCount}/${matchTotalCount}`;
      }
    }
    
    document.getElementById('btn-reset-match').addEventListener('click', () => {
      generateMatch(false);
    });
    document.getElementById('btn-new-match').addEventListener('click', () => {
      generateMatch(true);
    });
  </script>
 </body>
</html>
